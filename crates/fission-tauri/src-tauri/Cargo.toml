[package]
name = "fission-tauri"
version = "0.1.0"
description = "Fission - Tauri GUI"
authors = ["Fission Dev Team"]
edition = "2021"
repository = "https://github.com/sjkim1127/Fission"
license = "AGPL-3.0-or-later"
readme = "../../../README.md"
keywords = ["fission", "tauri", "decompiler", "gui"]
categories = ["development-tools", "gui"]

[lib]
name = "fission_tauri_lib"
crate-type = ["staticlib", "cdylib", "rlib"]

[build-dependencies]
tauri-build = { version = "2", features = [] }

[dependencies]
tauri = { version = "2", features = ["devtools"] }
tauri-plugin-opener = "2"
tauri-plugin-dialog = "2"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tokio = { version = "1", features = ["full"] }

# Fission crates
fission-core = { path = "../../fission-core" }
fission-loader = { path = "../../fission-loader" }
fission-static = { path = "../../fission-static" }
fission-decompiler-core = { path = "../../fission-decompiler-core" }
fission-dynamic = { path = "../../fission-dynamic", features = ["interactive_runtime"] }  # needed for plugin/debug/runtime UI
fission-ttd = { path = "../../fission-ttd" }
fission-plugin = { path = "../../fission-plugin", features = ["interactive_runtime"] }
fission-pcode = { path = "../../fission-pcode" }
fission-sleigh = { path = "../../fission-sleigh" }
fission-signatures = { path = "../../fission-signatures" }
tracing = "0.1"
crossbeam-channel = "0.5"
mimalloc = { version = "0.1", optional = true }
jemallocator = { version = "0.5", optional = true }

[features]
default = []
allocator-mimalloc = ["dep:mimalloc"]
allocator-jemallocator = ["dep:jemallocator"]
