[package]
name = "fission-tauri"
version = "0.1.0"
description = "Fission - Tauri GUI"
authors = ["Fission Dev Team"]
edition = "2021"
license = "AGPL-3.0-or-later"

[lib]
name = "fission_tauri_lib"
crate-type = ["staticlib", "cdylib", "rlib"]

[build-dependencies]
tauri-build = { version = "2", features = [] }

[dependencies]
tauri = { version = "2", features = ["devtools"] }
tauri-plugin-opener = "2"
tauri-plugin-dialog = "2"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tokio = { version = "1", features = ["full"] }
iced-x86 = { version = "1.21", features = ["std"] }

# Fission crates
fission-core = { path = "../../fission-core" }
fission-loader = { path = "../../fission-loader" }
fission-static = { path = "../../fission-static" }
fission-dynamic = { path = "../../fission-dynamic", features = ["interactive_runtime"] }  # needed for plugin/debug/runtime UI
fission-pcode = { path = "../../fission-pcode" }
fission-signatures = { path = "../../fission-signatures" }
tracing = "0.1"
crossbeam-channel = "0.5"

[features]
default = []
native_decomp = ["fission-static/native_decomp"]
