# cargo-fuzz workspace for the parent crate (`fission-loader`).
#
# Keep this directory next to the crate under test (standard `cargo-fuzz` layout).
# Run from `crates/fission-loader`: `cargo fuzz run fuzz_pe_parser` / `fuzz_elf_parser`.
# Scheduled CI: `.github/workflows/fuzz.yml` (`working-directory: crates/fission-loader`).
[workspace]

[package]
name = "fission-loader-fuzz"
version = "0.0.0"
authors = ["Automatically generated"]
publish = false
edition = "2024"
license = "AGPL-3.0-or-later"

[package.metadata]
cargo-fuzz = true

[dependencies]
libfuzzer-sys = "0.4"

[dependencies.fission-loader]
path = ".."

[[bin]]
name = "fuzz_pe_parser"
path = "fuzz_targets/fuzz_pe_parser.rs"
test = false
doc = false
bench = false

[[bin]]
name = "fuzz_elf_parser"
path = "fuzz_targets/fuzz_elf_parser.rs"
test = false
doc = false
bench = false
