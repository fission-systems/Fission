[package]
name = "fission-cli"
version = "0.1.0"
edition = "2024"
build = "build.rs"
authors = ["Fission Dev Team"]
description = "Fission CLI and entrypoint"
license = "MIT"
repository = "https://github.com/sjkim1127/Fission"
readme = "../../README.md"
keywords = ["fission", "decompiler", "reverse-engineering", "ghidra"]
categories = ["development-tools::debugging"]
default-run = "fission"

[lib]
name = "fission_cli"
path = "src/lib.rs"
test = false

[features]
default = ["gui", "cli", "native_decomp"]
gui = ["dep:fission-ui", "dep:eframe", "dep:egui"]
cli = ["dep:reedline", "dep:clap"]
tui = ["dep:ratatui", "dep:crossterm", "dep:clap"]
native_decomp = ["fission-analysis/native_decomp", "dep:fission-ffi"]
python = ["fission-analysis/python"]

[dependencies]
fission-core = { path = "../fission-core" }
fission-loader = { path = "../fission-loader" }
fission-analysis = { path = "../fission-analysis" }
fission-ffi = { path = "../fission-ffi", optional = true }
fission-ui = { path = "../fission-ui", optional = true }
eframe = { version = "0.29", optional = true }
egui = { version = "0.29", optional = true }
reedline = { version = "0.30", optional = true }
clap = { version = "4.5", features = ["derive"], optional = true }
ratatui = { version = "0.29", optional = true }
crossterm = { version = "0.28", optional = true }
colored = "2.1"
iced-x86 = { version = "1.21", features = ["std"] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
libc = "0.2"

[[bin]]
name = "fission"
path = "src/main.rs"
test = false
required-features = ["cli", "gui"]

[[bin]]
name = "fission_tui"
path = "src/bin/fission_tui.rs"
required-features = ["tui"]
test = false

[[bin]]
name = "fission_cli"
path = "src/bin/fission_cli.rs"
required-features = ["cli"]
test = false

[[bin]]
name = "ffi_test"
path = "src/bin/ffi_test.rs"
test = false
