# Fission decompiler benchmark suite — MinGW i686 x86 build
# Compiled from examples/sources/comparison_test.c
#   i686-w64-mingw32-gcc -O1 -g -o examples/binaries/comparison_test_x86.exe examples/sources/comparison_test.c
#
# Used with:
#   python3 scripts/compare/compare_decompilers_v3.py --suite scripts/compare/suite_x86.yaml scripts/result_x86
#
# Image base: 0x400000 (standard PE32 default)

name: "decomp-quality-x86"

binaries:
  - path: "examples/binaries/comparison_test_x86.exe"
    image_base: "0x400000"
    functions:
      - address: "0x401460"
        name: "add"
        expected_patterns:
          - "return"

      - address: "0x401469"
        name: "multiply"
        expected_patterns:
          - "return"

      - address: "0x401473"
        name: "print_message"
        expected_patterns:
          - "printf("

      - address: "0x40148e"
        name: "init_item"
        expected_patterns:
          - "->"
          - "="

      - address: "0x40151c"
        name: "create_item"
        expected_patterns:
          - "malloc("
          - "->"
          - "return"

      - address: "0x401578"
        name: "calculate_discount"
        expected_patterns:
          - "if ("
          - "return"

      - address: "0x4015fe"
        name: "sum_array"
        expected_patterns:
          - "for ("
          - "return"

      - address: "0x401633"
        name: "main"
        expected_patterns:
          - "create_item("
          - "init_item("
          - "return"
