# Fission decompiler benchmark suite — MinGW x86_64 -O2 build
# Compiled from examples/sources/comparison_test.c
#   x86_64-w64-mingw32-gcc -O2 -g \
#     -o examples/binaries/comparison_test_x64_O2.exe \
#     examples/sources/comparison_test.c
#
# Used with:
#   python3 scripts/compare/compare_decompilers_v3.py \
#     --suite scripts/compare/suite_x64_O2.yaml scripts/result_x64_O2
#
# -O2 vs -O1 differences to watch:
#   • sum_array: GCC 15 may vectorize with SSE2 → complex pointer arithmetic
#   • main: destroy_item may be inlined to direct free() call
#   • calculate_discount: condition merging / branch prediction hints
#   • add/multiply: may use lea/imul directly without stack frame

name: "decomp-quality-x64-O2"

binaries:
  - path: "examples/binaries/comparison_test_x64_O2.exe"
    image_base: "0x140000000"
    functions:
      - address: "0x140001450"
        name: "add"
        expected_patterns:
          - "return"

      - address: "0x140001460"
        name: "multiply"
        expected_patterns:
          - "return"

      - address: "0x140001470"
        name: "print_message"
        expected_patterns:
          - "printf("

      - address: "0x140001480"
        name: "init_item"
        expected_patterns:
          - "->"
          - "="

      - address: "0x1400014d0"
        name: "print_item"
        expected_patterns:
          - "printf("

      - address: "0x140001520"
        name: "create_item"
        expected_patterns:
          - "malloc("
          - "return"

      - address: "0x140001580"
        name: "destroy_item"
        expected_patterns:
          - "free("

      - address: "0x1400015a0"
        name: "calculate_discount"
        expected_patterns:
          - "if ("
          - "return"

      - address: "0x1400015e0"
        name: "sum_array"
        expected_patterns:
          - "return"

      - address: "0x140002a30"
        name: "main"
        expected_patterns:
          - "create_item("
          - "return"
