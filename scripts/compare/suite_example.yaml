# Fission decompiler benchmark suite definition
# Used with: python3 scripts/compare/compare_decompilers_v3.py --suite <this_file>
#
# Schema:
#   name          : Suite identifier (used in output directory name)
#   binaries[]    : List of binaries to benchmark
#     path        : Path relative to project root
#     image_base  : (optional) PE image base in hex
#     functions[] : List of functions to compare
#       address          : Function entry address in hex
#       name             : (optional) Human-readable label
#       expected_patterns: (optional) Strings that should appear in Fission output
#       runs             : (optional) Override global --runs for this function

name: "decomp-quality-v1"

binaries:
  - path: "examples/binaries/comparison_test_x64.exe"
    image_base: "0x140000000"
    functions:
      - address: "0x140001450"
        name: "add"
        expected_patterns:
          - "return"

      - address: "0x140001464"
        name: "multiply"
        expected_patterns:
          - "return"

      - address: "0x140001477"
        name: "print_message"
        expected_patterns:
          - "printf("

      - address: "0x14000149d"
        name: "init_item"
        expected_patterns:
          - "->"
          - "="

      - address: "0x14000156a"
        name: "create_item"
        expected_patterns:
          - "malloc("
          - "->"
          - "return"

      - address: "0x1400015e2"
        name: "calculate_discount"
        expected_patterns:
          - "if ("
          - "return"

      - address: "0x140001633"
        name: "sum_array"
        expected_patterns:
          - "for ("
          - "return"

      - address: "0x140001680"
        name: "main"
        expected_patterns:
          - "if ("
          - "printf("
          - "return"

  # C++ binary (virtual functions, vtables)
  # - path: "examples/binaries/comparison_test_cpp_x64.exe"
  #   functions:
  #     - address: "0x..."
  #       name: "ctor"
  #       expected_patterns: ["->", "virtual"]
