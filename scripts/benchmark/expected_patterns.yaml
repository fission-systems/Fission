  make_small:
    patterns: ["return"]
    notes: "small struct return via registers"
  sum_variadic:
    patterns: ["while", "return"]
    notes: "va_list processing"
  log_message:
    patterns: ["printf("]
    notes: "variadic format string"
  apply_op:
    patterns: ["return"]
    notes: "function pointer call"
  add:
    patterns: ["return", "+"]
  sub:
    patterns: ["return", "-"]
  mul:
    patterns: ["return", "*"]
  dispatch_op:
    patterns: ["if (", "return"]
    notes: "function pointer dispatch"
  factorial_tail:
    patterns: ["if (", "return"]
    notes: "tail call candidate"
  factorial:
    patterns: ["return"]
  process_array:
    patterns: ["for ("]
    notes: "callback pattern"
  sum_callback:
    patterns: ["return"]

# ── String & Memory ──────────────────────────────────────────────────────────
strings:
  get_greeting:
    patterns: ["switch", "return"]
    notes: "string literal dispatch"
  my_strlen:
    patterns: ["while", "return"]
    notes: "manual strlen loop"
  zero_buffer:
    patterns: ["for (", "= 0"]
    notes: "manual memset loop"
  my_memcpy:
    patterns: ["for ("]
    notes: "manual memcpy loop"
  sb_init:
    patterns: ["malloc(", "->"]
    notes: "StringBuilder init"
  sb_append:
    patterns: ["->", "realloc("]
    notes: "StringBuilder append with realloc"
  sb_free:
    patterns: ["free("]
  format_address:
    patterns: ["snprintf("]
    notes: "stack buffer + snprintf"
  classify_command:
    patterns: ["strcmp(", "return"]
    notes: "strcmp chain"
  count_words:
    patterns: ["while", "return"]
    notes: "tokenizer loop"
  duplicate_string:
    patterns: ["malloc(", "return"]
  find_string:
    patterns: ["for (", "strcmp(", "return"]
  popcount32:
    patterns: ["while", "&", "return"]
    notes: "Brian Kernighan popcount"
  parse_packet:
    patterns: ["->", "return"]
    notes: "buffer → struct overlay"

# ── Advanced Patterns ────────────────────────────────────────────────────────
advanced:
  rotate_left:
    patterns: ["|", "<<", ">>", "return"]
    notes: "bit rotation ROL"
  rotate_right:
    patterns: ["|", "<<", ">>", "return"]
    notes: "bit rotation ROR"
  bswap32:
    patterns: [">>", "<<", "return"]
    notes: "byte swap"
  bswap16:
    patterns: [">>", "<<", "return"]
  count_leading_zeros:
    patterns: ["while", "return"]
    notes: "CLZ loop"
  count_trailing_zeros:
    patterns: ["return", "&"]
    notes: "CTZ"
  next_token:
    patterns: ["switch", "return"]
    notes: "state machine tokenizer"
  dispatch_operation:
    patterns: ["return"]
    notes: "function pointer table dispatch"
  fnv1a_hash:
    patterns: ["while", "^", "return"]
    notes: "FNV-1a hash: XOR + multiply"
  murmur3_mix:
    patterns: [">>", "return"]
  crc32_init:
    patterns: ["for ("]
    notes: "CRC32 table initialization"
  crc32_compute:
    patterns: ["for (", "^", "return"]
    notes: "CRC32 table-driven"
  get_flag:
    patterns: [">>", "&", "return"]
    notes: "bitfield extraction"
  set_flag:
    patterns: ["|", "return"]
    notes: "bitfield set"
  clear_flag:
    patterns: ["&", "return"]
    notes: "bitfield clear"
  extract_bits:
    patterns: [">>", "&", "return"]
  insert_bits:
    patterns: ["|", "&", "return"]
  complex_expression:
    patterns: ["return"]
  multi_ternary:
    patterns: ["return"]
    notes: "ternary chain → cmov"
  min3:
    patterns: ["return"]
  max3:
    patterns: ["return"]
  # static handler functions (may be inlined in O2)
  handle_add:
    patterns: ["return", "+"]
    notes: "may be inlined in O2"
  handle_sub:
    patterns: ["return", "-"]
    notes: "may be inlined in O2"
  handle_mul:
    patterns: ["return", "*"]
    notes: "may be inlined in O2"
  handle_div:
    patterns: ["return", "/"]
    notes: "may be inlined in O2"
  handle_mod:
    patterns: ["return", "%"]
    notes: "may be inlined in O2"
  handle_and:
    patterns: ["return", "&"]
    notes: "may be inlined in O2"
  handle_or:
    patterns: ["return", "|"]
    notes: "may be inlined in O2"
  handle_xor:
    patterns: ["return", "^"]
    notes: "may be inlined in O2"

# ── Real-World Algorithms ────────────────────────────────────────────────────
algorithms:
  insertion_sort:
    patterns: ["for (", "while"]
  quicksort:
    patterns: ["if (", "quicksort("]
    notes: "recursive call"
  partition:
    patterns: ["while", "return"]
    notes: "static — may be inlined in O2"
  binary_search:
    patterns: ["while", "if (", "return"]
  ht_init:
    patterns: ["malloc(", "for ("]
    notes: "hash table init"
  ht_put:
    patterns: ["while", "->", "if ("]
    notes: "linear probing insert"
  ht_get:
    patterns: ["while", "->", "return"]
    notes: "linear probing lookup"
  ht_hash:
    patterns: ["while", "return"]
    notes: "DJB2 hash — static, may be inlined"
  rb_create:
    patterns: ["malloc(", "->", "return"]
    notes: "ring buffer create"
  rb_push:
    patterns: ["->", "if ("]
  rb_pop:
    patterns: ["->", "if (", "return"]
  rb_free:
    patterns: ["free("]
  base64_encode:
    patterns: ["while", ">>", "return"]
    notes: "Base64 encoding with shift+mask"
  parse_command:
    patterns: ["while", "if ("]
    notes: "command line parser with quoted args"
  execute_command:
    patterns: ["if (", "strcmp("]
    notes: "command executor with strcmp dispatch"
  matrix_transpose:
    patterns: ["for ("]
    notes: "nested loop transpose"
  matrix_trace:
    patterns: ["for (", "return"]
    notes: "diagonal sum"

# ── main (common to all binaries) ────────────────────────────────────────────
common:
  main:
    patterns: ["printf(", "return"]
