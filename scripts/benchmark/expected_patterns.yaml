# ===========================================================================
# expected_patterns.yaml
# Per-function expected patterns for decompiler quality scoring.
#
# Each function lists string patterns that SHOULD appear in correct
# decompiler output.  Used by benchmark_v4.py checklist scoring.
#
# Categories:
#   arithmetic  — test_arithmetic_idioms.cpp
#   control     — test_control_flow.cpp
#   structs     — test_structs_classes.cpp
#   calling     — test_calling_conventions.cpp
#   strings     — test_string_memory.cpp
#   advanced    — test_advanced_patterns.cpp
#   algorithms  — test_real_world_algorithms.cpp
# ===========================================================================

