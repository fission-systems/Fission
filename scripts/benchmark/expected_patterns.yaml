# ── Control Flow ─────────────────────────────────────────────────────────────
control:
  day_name:
    patterns: ["switch", "case", "return"]
    notes: "jump table switch (7+ cases)"
  sparse_switch:
    patterns: ["if (", "return"]
    notes: "BST dispatch or cascaded if-else"
  classify_temperature:
    patterns: ["if (", "return"]
  sum_range:
    patterns: ["for (", "return"]
  count_digits:
    patterns: ["while", "return"]
  find_first_set:
    patterns: ["while", "return", "&"]
    notes: "do-while loop"
  matrix_multiply:
    patterns: ["for ("]
    notes: "triple-nested loop"
  read_until_sentinel:
    patterns: ["while", "return"]
  count_set_bits_loop:
    patterns: ["while", "return"]
  safe_divide:
    patterns: ["if (", "return"]
  clamp:
    patterns: ["if (", "return"]
  fatal_error:
    patterns: ["printf("]
    notes: "noreturn function"
  process_command:
    patterns: ["if ("]
  constant_condition_test:
    patterns: ["return"]
    notes: "dead branch should be eliminated"
  memzero_manual:
    patterns: ["for (", "= 0"]
    notes: "memset loop"
  fibonacci:
    patterns: ["if (", "return"]
    notes: "recursive"

# ── Structs & Classes ────────────────────────────────────────────────────────
structs:
  make_point:
    patterns: ["return"]
  rect_area:
    patterns: ["->", "return", "*"]
  rect_perimeter:
    patterns: ["->", "return"]
  validate_header:
    patterns: ["->", "if (", "return"]
  list_insert:
    patterns: ["malloc(", "->", "return"]
  list_length:
    patterns: ["while", "->", "return"]
  list_sum:
    patterns: ["while", "->", "return"]
  list_free:
    patterns: ["while", "->", "free("]
  total_salary:
    patterns: ["for (", "return"]
  find_employee:
    patterns: ["for (", "if (", "return"]

# ── Calling Conventions ──────────────────────────────────────────────────────
calling:
