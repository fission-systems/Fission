  signed_div_7:
    patterns: ["return"]
  mod_2:
    patterns: ["return", "&"]
  mod_4:
    patterns: ["return", "&"]
  mod_8:
    patterns: ["return", "&"]
  mod_16:
    patterns: ["return", "&"]
  mod_256:
    patterns: ["return", "&"]
  multiply_by_2:
    patterns: ["return"]
  multiply_by_4:
    patterns: ["return"]
  multiply_by_8:
    patterns: ["return"]
  unsigned_div_2:
    patterns: ["return"]
  unsigned_div_4:
    patterns: ["return"]
  signed_mod_2:
