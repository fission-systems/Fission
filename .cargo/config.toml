# Cargo configuration for Fission development

# Use sccache for faster rebuilds
[build]
rustc-wrapper = "sccache"

# Address Sanitizer configuration (for debugging memory issues)
# Usage: RUSTFLAGS="-Zsanitizer=address" cargo +nightly run --target x86_64-apple-darwin
[target.x86_64-apple-darwin]
rustflags = [
  # To use a high-speed linker on macOS, install zld or lld via brew and uncomment below:
  # "-C", "link-arg=-fuse-ld=zld",
  # "-C", "link-arg=-fuse-ld=lld",
]

[target.aarch64-apple-darwin]
rustflags = [
  # To use a high-speed linker on macOS, install zld or lld via brew and uncomment below:
  # "-C", "link-arg=-fuse-ld=zld",
  # "-C", "link-arg=-fuse-ld=lld",
]

# Test profile: balance compile speed vs runtime speed
[profile.test]
opt-level = 1
debug = 1 # Reduced from true (2) to 1 for much faster compilation and linking
debug-assertions = true
overflow-checks = true
lto = false
codegen-units = 16

# Linker settings for better performance
[profile.dev]
opt-level = 0
debug = 1 # Reduced from default 2 to 1 for much faster compilation and linking
# Faster linking with lld (if available)
# linker = "clang"

[profile.release]
lto = "thin"
codegen-units = 1
strip = "symbols"

# Profiling build (with debug symbols)
[profile.profiling]
inherits = "release"
debug = true
strip = "none"

[env]
# Enable colored output in CI
CARGO_TERM_COLOR = "always"
