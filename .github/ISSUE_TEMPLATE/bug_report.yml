name: Bug report
description: Unexpected behavior, crash, or tooling failure (general).
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        **Samples:** Do not attach malware or unsolicited exploit binaries. Prefer hashes, in-repo benign fixtures (`benchmark/binary/`), or coordinated disclosure per [`SECURITY.md`](SECURITY.md).

  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What went wrong in one or two sentences?
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: Commands, inputs, and minimal context.
      placeholder: |
        ```bash
        fission-cli ...
        ```
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: Logs, stderr, panic trace (paste text; avoid huge binaries).
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Version / commit
      description: "`fission-cli --version`, git SHA, or release tag."
    validations:
      required: false

  - type: dropdown
    id: platform
    attributes:
      label: Host OS
      options:
        - Linux
        - macOS
        - Windows
        - Other
    validations:
      required: false
