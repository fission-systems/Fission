name: Setup sccache
description: >
  Install mozilla sccache with GitHub Actions backend and export RUSTC_WRAPPER.
  Pair with Swatinem/rust-cache for registry/git cache; sccache speeds recompiles.

inputs:
  version:
    description: sccache release version (without v prefix)
    required: false
    default: "0.10.0"

runs:
  using: composite
  steps:
    - name: Install sccache (GHA cache backend)
      uses: mozilla-actions/sccache-action@v0.0.9
      with:
        version: ${{ inputs.version }}

    - name: Export Rust wrapper env
      shell: bash
      run: |
        echo "SCCACHE_GHA_ENABLED=true" >> "$GITHUB_ENV"
        echo "RUSTC_WRAPPER=sccache" >> "$GITHUB_ENV"
        echo "CARGO_INCREMENTAL=0" >> "$GITHUB_ENV"
        # Avoid noisy stats failures if sccache dies mid-job
        echo "SCCACHE_ERROR_LOG=${{ runner.temp }}/sccache.log" >> "$GITHUB_ENV"
        sccache --version
        sccache --show-stats || true
