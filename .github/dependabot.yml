version: 2
updates:
  - package-ecosystem: cargo
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5

  - package-ecosystem: npm
    directory: "/crates/fission-tauri"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 3

  - package-ecosystem: pip
    directory: "/benchmark/full_benchmark"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 3

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: "monthly"
