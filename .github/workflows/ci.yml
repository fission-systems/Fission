name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build and Test (Linux)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: crates/fission-tauri/package-lock.json

      - name: Install cargo-deny
        run: cargo install cargo-deny --locked

      - name: Security advisory check (Rust — advisories, bans, licenses, sources)
        run: cargo deny check all

      - name: Security advisory check (Node)
        run: |
          cd crates/fission-tauri
          npm ci --ignore-scripts
          npm audit --audit-level=high

      - name: Install system dependencies (Linux/Tauri)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libssl-dev \
            librsvg2-dev \
            libayatana-appindicator3-dev \
            build-essential \
            file

      - name: Build Decompiler
        run: |
          chmod +x scripts/build/build_decompiler.sh
          ./scripts/build/build_decompiler.sh

      - name: Check Formatting
        run: cargo fmt -- --check

      - name: Lint with Clippy
        run: cargo clippy --workspace -- -D warnings

      - name: Check Documentation
        run: cargo doc --workspace --no-deps --document-private-items
        env:
          RUSTDOCFLAGS: "-D warnings"

      - name: Run Tests
        run: cargo test --workspace --verbose

      - name: Fission decompilation smoke test
        run: |
          chmod +x scripts/test/decomp_smoke_ci.sh
          ./scripts/test/decomp_smoke_ci.sh

  build-macos:
    name: Build and Test (macOS)
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Build Decompiler
        run: |
          chmod +x scripts/build/build_decompiler.sh
          ./scripts/build/build_decompiler.sh

      - name: Check Formatting
        run: cargo fmt -- --check

      - name: Lint with Clippy
        run: cargo clippy --workspace -- -D warnings

      - name: Run Tests
        run: cargo test --workspace --verbose
