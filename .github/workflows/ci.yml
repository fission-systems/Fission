name: CI Fast Gate

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

concurrency:
  group: ci-fast-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  linux-fast-gate:
    name: Linux Fast Gate
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache Rust build outputs
        uses: Swatinem/rust-cache@v2

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: crates/fission-tauri/package-lock.json

      - name: Install cargo-deny
        run: cargo install cargo-deny --locked

      - name: Security advisory check (Rust — advisories, bans, licenses, sources)
        run: cargo deny check all

      - name: Security advisory check (Node)
        run: |
          cd crates/fission-tauri
          npm ci --ignore-scripts
          npm audit --audit-level=high

      - name: Install system dependencies (Linux/Tauri)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libssl-dev \
            librsvg2-dev \
            libayatana-appindicator3-dev \
            build-essential \
            file

      - name: Check Formatting
        run: cargo fmt -- --check

      - name: Lint with Clippy
        run: cargo clippy --workspace --exclude fission-tauri -- -D warnings

      - name: Run Tests
        run: cargo test -p fission-pcode -p fission-automation -p fission-loader --verbose

  windows-build-test:
    name: Windows Build/Test
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build outputs
        uses: Swatinem/rust-cache@v2

      - name: Build fission-cli (release)
        run: cargo build -p fission-cli --release

      - name: Run Windows core tests
        run: cargo test -p fission-pcode -p fission-automation --release --verbose

  macos-build-test:
    name: Build and Test (macOS)
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache Rust build outputs
        uses: Swatinem/rust-cache@v2

      - name: Check Formatting
        run: cargo fmt -- --check

      - name: Lint with Clippy
        run: cargo clippy --workspace --exclude fission-tauri -- -D warnings

      - name: Run Tests
        run: cargo test -p fission-pcode -p fission-automation -p fission-loader --verbose
