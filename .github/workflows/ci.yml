name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build and Test
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Install Rust
      uses: dtolnay/rust-toolchain@stable
      with:
        components: clippy, rustfmt

    - name: Install CMake
      uses: jwlawrence/cmake-action@v1
      with:
        cmake-version: '3.20'

    - name: Build Decompiler (Unix)
      if: runner.os != 'Windows'
      run: |
        chmod +x scripts/build_decompiler.sh
        ./scripts/build_decompiler.sh

    - name: Build Decompiler (Windows)
      if: runner.os == 'Windows'
      run: |
        cd ghidra_decompiler
        mkdir build
        cd build
        cmake ..
        cmake --build . --config Release

    - name: Check Formatting
      run: cargo fmt -- --check

    - name: Lint with Clippy
      run: cargo clippy -- -D warnings

    - name: Run Tests
      run: cargo test --verbose
