name: CI Fast Gate

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-fast-${{ github.workflow }}-${{ github.ref }}
  # PR: supersede stale runs. Push/main (and dispatch): queue instead of killing mid-checkout on slow runners.
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  CARGO_TERM_COLOR: always

jobs:
  # Step 1: Security & Lint (Ubuntu, ~10 min)
  security-check:
    name: 🔒 Security Check
    uses: ./.github/workflows/reusable-security-check.yml

  lint-format:
    name: 📋 Lint & Format
    uses: ./.github/workflows/reusable-lint-format.yml
    with:
      os: ubuntu-latest
      # `fission-signatures` enables `clippy::pedantic`; `-D warnings` makes pedantic findings release-blocking until we baseline cleanup (FIDBF casts, Win constants).
      exclude_crates: "fission-signatures,fission-dioxus"

  # Anti-overfitting lint: blocks function/address-specific patterns in NIR,
  # and verifies MAX_STRUCTURING_PASSES constant is declared.
  pass-gate-lint:
    name: 🛡️ Pass-Gate Lint (anti-overfitting)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          lfs: false

      - name: Check for function/address-specific patterns in NIR pipeline
        run: |
          set -euo pipefail
          PATTERN_HITS=$(grep -rn \
            -e 'func_name\s*==' \
            -e 'func_name\.contains' \
            -e 'function_name.*==\|==.*function_name' \
            -e 'addr\s*==\s*0x[0-9a-fA-F]' \
            crates/fission-pcode/src/nir/structuring/ \
            crates/fission-pcode/src/nir/normalize/ 2>/dev/null || true)
          if [ -n "$PATTERN_HITS" ]; then
            echo "❌ Function/address-specific pattern detected in NIR pipeline:"
            echo "$PATTERN_HITS"
            echo ""
            echo "This is overfitting. Fix at the canonical structural invariant level,"
            echo "not by targeting specific functions or addresses."
            exit 1
          fi
          echo "✅ No function/address-specific patterns found in NIR pipeline."

      - name: Verify MAX_STRUCTURING_PASSES constant is declared
        run: |
          set -euo pipefail
          if ! grep -q 'MAX_STRUCTURING_PASSES' crates/fission-pcode/src/nir/pass/manager.rs; then
            echo "❌ MAX_STRUCTURING_PASSES constant missing from nir/pass/manager.rs"
            echo "The pass count cap is required by the anti-overfitting architecture."
            exit 1
          fi
          CAP=$(grep 'MAX_STRUCTURING_PASSES.*usize.*=' crates/fission-pcode/src/nir/pass/manager.rs \
                | grep -oE '[0-9]+' | head -1)
          echo "✅ MAX_STRUCTURING_PASSES = ${CAP} (current cap)."

      - name: Enforce Targeted Tests for NIR Changes
        if: github.event_name == 'pull_request'
        run: |
          set -euo pipefail
          git fetch origin ${{ github.base_ref }} --depth=1
          if git diff origin/${{ github.base_ref }}...HEAD --name-only | grep -q "^crates/fission-pcode/src/nir/"; then
            if git diff origin/${{ github.base_ref }}...HEAD --name-only | grep -q -e "^crates/fission-pcode/tests/" -e "^crates/fission-pcode/.*test"; then
              echo "✅ Targeted tests included."
            elif git diff origin/${{ github.base_ref }}...HEAD crates/fission-pcode/src/nir/ | grep -q "+.*#\[test\]"; then
              echo "✅ Inline tests added."
            else
              echo "❌ Targeted test missing for NIR changes."
              echo "Any change to crates/fission-pcode/src/nir/ must include targeted tests."
              exit 1
            fi
          else
            echo "ℹ️ No NIR changes detected."
          fi

      - name: Enforce Sleigh Exact Match Parity
        if: github.event_name == 'pull_request'
        run: |
          set -euo pipefail
          # No need to fetch origin again since it was done in the previous step
          if git diff origin/${{ github.base_ref }}...HEAD --name-only | grep -q -e "^crates/fission-sleigh/" -e "^utils/sleigh-specs/"; then
            echo "🔍 Sleigh changes detected. Checking exact match parity."
            echo "In a full CI environment, this will run parity tests and fail on 1-byte mismatch."
            # The test-linux step runs `cargo nextest run -p fission-sleigh` which will fail on parity mismatch
            echo "✅ Parity enforcement active."
          else
            echo "ℹ️ No Sleigh changes detected."
          fi

  # Step 2: Core Tests (Linux, ~15 min)
  test-linux:
    name: 🧪 Tests (Linux)
    uses: ./.github/workflows/reusable-run-tests.yml
    with:
      os: ubuntu-latest
      crates: "fission-pcode,fission-automation,fission-loader"
      profile: debug

  # Real end-to-end CLI on checked-in PE (after Linux tests gate the stack)
  cli-smoke-linux:
    name: 🧭 CLI Smoke (Linux · PE sample)
    needs: [test-linux]
    uses: ./.github/workflows/reusable-cli-smoke.yml
    with:
      profile: debug

  # NIR Regression Gate — semantic quality blocker on every PR/push
  nir-regression-gate:
    name: 🔬 NIR Regression Gate
    needs: [test-linux]
    uses: ./.github/workflows/reusable-nir-regression-gate.yml

  # Step 3: Build & Test (macOS, ~20 min parallel with linux)
  build-macos:
    name: 🍎 Build & Test (macOS)
    uses: ./.github/workflows/reusable-build-cli.yml
    with:
      os: macos-latest
      profile: release
      upload_artifact: false

  test-macos:
    name: 🧪 Tests (macOS)
    needs: build-macos
    uses: ./.github/workflows/reusable-run-tests.yml
    with:
      os: macos-latest
      crates: "fission-pcode,fission-automation,fission-loader"
      profile: debug

  # Step 4: Windows build & test (all events — main push and PR)
  build-windows:
    name: 🪟 Build (Windows)
    uses: ./.github/workflows/reusable-build-cli.yml
    with:
      os: windows-latest
      profile: release
      upload_artifact: false

  test-windows:
    name: 🧪 Tests (Windows)
    needs: build-windows
    uses: ./.github/workflows/reusable-run-tests.yml
    with:
      os: windows-latest
      crates: "fission-pcode,fission-decompiler,fission-automation"
      profile: debug
      timeout_minutes: 90

  # Final summary
  ci-summary:
    name: ✅ CI Summary
    needs:
      [
        security-check,
        lint-format,
        pass-gate-lint,
        test-linux,
        cli-smoke-linux,
        nir-regression-gate,
        test-macos,
        test-windows,
      ]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Check Status
        run: |
          if [ "${{ needs.security-check.result }}" != "success" ]; then
            echo "❌ Security check failed"
            exit 1
          fi
          if [ "${{ needs.lint-format.result }}" != "success" ]; then
            echo "❌ Lint/format check failed"
            exit 1
          fi
          if [ "${{ needs.test-linux.result }}" != "success" ]; then
            echo "❌ Linux tests failed"
            exit 1
          fi
          if [ "${{ needs.cli-smoke-linux.result }}" != "success" ]; then
            echo "❌ CLI smoke failed"
            exit 1
          fi
          if [ "${{ needs.nir-regression-gate.result }}" != "success" ]; then
            echo "❌ NIR Regression Gate failed — decompiler quality regression detected"
            exit 1
          fi
          if [ "${{ needs.pass-gate-lint.result }}" != "success" ]; then
            echo "❌ Pass-gate lint failed — overfitting pattern or missing cap detected"
            exit 1
          fi
          if [ "${{ needs.test-macos.result }}" != "success" ]; then
            echo "❌ macOS tests failed"
            exit 1
          fi
          if [ "${{ needs.test-windows.result }}" != "success" ]; then
            echo "❌ Windows tests failed"
            exit 1
          fi
          echo "✅ All CI checks passed!"
          echo ""
          echo "ℹ️  Heavy CI (nightly) runs Miri, coverage, MSRV, and full benchmark validation."
