name: CI Fast Gate

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-fast-${{ github.workflow }}-${{ github.ref }}
  # PR: supersede stale runs. Push/main (and dispatch): queue instead of killing mid-checkout on slow runners.
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  CARGO_TERM_COLOR: always

jobs:
  # Bundled Ghidra / DIE paths (stdlib-only; catches accidental subtree drops)
  third-party-canary:
    name: 📎 Third-party data canary
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Ghidra + DIE corpus sanity
        run: python3 scripts/test/third_party_data_canary.py

      - name: Resource path literal guard
        run: bash scripts/test/check_resource_path_literals.sh

  # Step 1: Security & Lint (Ubuntu, ~10 min)
  security-check:
    name: 🔒 Security Check
    uses: ./.github/workflows/reusable-security-check.yml

  lint-format:
    name: 📋 Lint & Format
    uses: ./.github/workflows/reusable-lint-format.yml
    with:
      os: ubuntu-latest
      # `fission-signatures` enables `clippy::pedantic`; `-D warnings` makes pedantic findings release-blocking until we baseline cleanup (FIDBF casts, Win constants).
      exclude_crates: "fission-signatures"

  # Step 2: Core Tests (Linux, ~15 min)
  test-linux:
    name: 🧪 Tests (Linux)
    needs: [security-check, lint-format]
    uses: ./.github/workflows/reusable-run-tests.yml
    with:
      os: ubuntu-latest
      crates: "fission-pcode,fission-automation,fission-loader"
      profile: debug

  # Real end-to-end CLI on checked-in PE (after Linux tests gate the stack)
  cli-smoke-linux:
    name: 🧭 CLI Smoke (Linux · PE sample)
    needs: [test-linux]
    uses: ./.github/workflows/reusable-cli-smoke.yml
    with:
      profile: debug

  # Step 3: Build & Test (macOS, ~20 min parallel with linux)
  build-macos:
    name: 🍎 Build & Test (macOS)
    needs: [security-check, lint-format]
    uses: ./.github/workflows/reusable-build-cli.yml
    with:
      os: macos-latest
      profile: release
      upload_artifact: false

  test-macos:
    name: 🧪 Tests (macOS)
    needs: build-macos
    uses: ./.github/workflows/reusable-run-tests.yml
    with:
      os: macos-latest
      crates: "fission-pcode,fission-automation,fission-loader"
      profile: debug

  # Step 4: Windows tests — PR only (expensive; heavy CI covers main branch)
  build-windows:
    name: 🪟 Build & Test (Windows) [PR only]
    if: github.event_name == 'pull_request'
    needs: [security-check, lint-format]
    uses: ./.github/workflows/reusable-build-cli.yml
    with:
      os: windows-latest
      profile: release
      upload_artifact: false

  test-windows:
    name: 🧪 Tests (Windows) [PR only]
    if: github.event_name == 'pull_request'
    needs: build-windows
    uses: ./.github/workflows/reusable-run-tests.yml
    with:
      os: windows-latest
      crates: "fission-pcode,fission-decompiler,fission-automation"
      # Match macOS fast gate: debug tests avoid duplicate release rebuild + timeout/cancel churn.
      profile: debug
      timeout_minutes: 90

  # Final summary
  ci-summary:
    name: ✅ CI Summary
    needs:
      [
        third-party-canary,
        security-check,
        lint-format,
        test-linux,
        cli-smoke-linux,
        test-macos,
      ]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Check Status
        run: |
          if [ "${{ needs.third-party-canary.result }}" != "success" ]; then
            echo "❌ Third-party data canary failed"
            exit 1
          fi
          if [ "${{ needs.security-check.result }}" != "success" ]; then
            echo "❌ Security check failed"
            exit 1
          fi
          if [ "${{ needs.lint-format.result }}" != "success" ]; then
            echo "❌ Lint/format check failed"
            exit 1
          fi
          if [ "${{ needs.test-linux.result }}" != "success" ]; then
            echo "❌ Linux tests failed"
            exit 1
          fi
          if [ "${{ needs.cli-smoke-linux.result }}" != "success" ]; then
            echo "❌ CLI smoke failed"
            exit 1
          fi
          if [ "${{ needs.test-macos.result }}" != "success" ]; then
            echo "❌ macOS tests failed"
            exit 1
          fi
          echo "✅ All CI checks passed!"
          echo ""
          echo "ℹ️  Windows tests run on PR only. Heavy CI (nightly) covers full platform validation."
