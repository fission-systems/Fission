name: CI Fast Gate

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  # sccache GHA backend writes action caches
  actions: write

concurrency:
  group: ci-fast-${{ github.workflow }}-${{ github.ref }}
  # PR: supersede stale runs. Push/main: queue instead of killing mid-job.
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  CARGO_TERM_COLOR: always

jobs:
  # Path-filter tiers (see docs/CI_RELEASE_GATES.md):
  #   docs     — docs/wiki/markdown only → short-circuit
  #   scripts  — scripts/** only → pass-gate + script syntax
  #   ci       — .github/** (and CI meta) only → pass-gate + workflow sanity
  #   rust     — crates/utils/Cargo/* → full Linux (and multi-OS on main)
  changes:
    name: 🔎 Detect changes
    runs-on: ubuntu-latest
    outputs:
      lane: ${{ steps.filter.outputs.lane }}
      run_security: ${{ steps.filter.outputs.run_security }}
      run_lint: ${{ steps.filter.outputs.run_lint }}
      run_pass_gate: ${{ steps.filter.outputs.run_pass_gate }}
      run_script_checks: ${{ steps.filter.outputs.run_script_checks }}
      run_tests: ${{ steps.filter.outputs.run_tests }}
      run_cli_smoke: ${{ steps.filter.outputs.run_cli_smoke }}
      run_nir_gate: ${{ steps.filter.outputs.run_nir_gate }}
      run_multi_os: ${{ steps.filter.outputs.run_multi_os }}
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
          lfs: false
          submodules: false

      - name: Classify changed paths
        id: filter
        shell: bash
        run: |
          set -euo pipefail

          # --- collect changed files ---
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            git fetch origin "${{ github.base_ref }}" --depth=1
            BASE="origin/${{ github.base_ref }}"
            CHANGED=$(git diff --name-only "$BASE"...HEAD || true)
          elif [ "${{ github.event_name }}" = "push" ]; then
            BEFORE="${{ github.event.before }}"
            if [ -z "$BEFORE" ] || [ "$BEFORE" = "0000000000000000000000000000000000000000" ]; then
              CHANGED=$(git show --name-only --pretty=format: HEAD || true)
            else
              CHANGED=$(git diff --name-only "$BEFORE"...HEAD || true)
            fi
          else
            # workflow_dispatch: full rust lane
            {
              echo "lane=rust"
              echo "run_security=true"
              echo "run_lint=true"
              echo "run_pass_gate=true"
              echo "run_script_checks=true"
              echo "run_tests=true"
              echo "run_cli_smoke=true"
              echo "run_nir_gate=true"
              echo "run_multi_os=true"
            } >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "Changed files:"
          echo "$CHANGED"

          if [ -z "$CHANGED" ]; then
            # empty diff — fail-safe full rust lane
            {
              echo "lane=rust"
              echo "run_security=true"
              echo "run_lint=true"
              echo "run_pass_gate=true"
              echo "run_script_checks=false"
              echo "run_tests=true"
              echo "run_cli_smoke=true"
              echo "run_nir_gate=true"
              if [ "${{ github.event_name }}" = "push" ]; then
                echo "run_multi_os=true"
              else
                echo "run_multi_os=false"
              fi
            } >> "$GITHUB_OUTPUT"
            exit 0
          fi

          has() { echo "$CHANGED" | grep -Eq "$1"; }

          RUST=false
          UTILS=false
          SCRIPTS=false
          CI=false
          SECURITY_META=false
          DOCS=false
          OTHER=false

          while IFS= read -r f; do
            [ -z "$f" ] && continue
            case "$f" in
              crates/*|Cargo.toml|Cargo.lock|.cargo/*|rust-toolchain|rust-toolchain.toml|clippy.toml)
                RUST=true ;;
              utils/*)
                UTILS=true ;;
              scripts/*)
                SCRIPTS=true ;;
              .github/workflows/*|.github/actions/*|.github/scripts/*)
                CI=true ;;
              deny.toml|licenserc.yaml|.github/dependabot.yml|.github/licenserc.yaml)
                SECURITY_META=true ;;
              docs/*|wiki/*|*.md|.github/ISSUE_TEMPLATE/*|.github/pull_request_template.md|.github/prompts/*)
                DOCS=true ;;
              *)
                # unknown paths are treated as rust-adjacent for safety
                OTHER=true ;;
            esac
          done <<< "$CHANGED"

          # Lane selection (most specific first)
          if [ "$RUST" = false ] && [ "$UTILS" = false ] && [ "$SCRIPTS" = false ] \
              && [ "$CI" = false ] && [ "$SECURITY_META" = false ] && [ "$OTHER" = false ] \
              && [ "$DOCS" = true ]; then
            LANE=docs
          elif [ "$RUST" = false ] && [ "$UTILS" = false ] && [ "$OTHER" = false ] \
              && [ "$SECURITY_META" = false ] && [ "$CI" = false ] && [ "$SCRIPTS" = true ]; then
            LANE=scripts
          elif [ "$RUST" = false ] && [ "$UTILS" = false ] && [ "$OTHER" = false ] \
              && [ "$SCRIPTS" = false ] && { [ "$CI" = true ] || [ "$SECURITY_META" = true ]; }; then
            LANE=ci
          else
            LANE=rust
          fi

          # Job toggles
          case "$LANE" in
            docs)
              RUN_SECURITY=false; RUN_LINT=false; RUN_PASS=false; RUN_SCRIPTS=false
              RUN_TESTS=false; RUN_SMOKE=false; RUN_NIR=false; RUN_MULTI=false
              ;;
            scripts)
              RUN_SECURITY=false; RUN_LINT=false; RUN_PASS=true; RUN_SCRIPTS=true
              RUN_TESTS=false; RUN_SMOKE=false; RUN_NIR=false; RUN_MULTI=false
              ;;
            ci)
              RUN_SECURITY=$SECURITY_META; RUN_LINT=false; RUN_PASS=true; RUN_SCRIPTS=true
              RUN_TESTS=false; RUN_SMOKE=false; RUN_NIR=false; RUN_MULTI=false
              # Workflow changes that touch reusable test runners still need a sanity compile? keep pass-gate only.
              if [ "$SECURITY_META" = true ]; then RUN_SECURITY=true; fi
              ;;
            rust)
              RUN_SECURITY=true; RUN_LINT=true; RUN_PASS=true; RUN_SCRIPTS=$SCRIPTS
              RUN_TESTS=true; RUN_SMOKE=true; RUN_NIR=true
              if [ "${{ github.event_name }}" = "push" ] || [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
                RUN_MULTI=true
              else
                RUN_MULTI=false
              fi
              ;;
          esac

          {
            echo "lane=${LANE}"
            echo "run_security=${RUN_SECURITY}"
            echo "run_lint=${RUN_LINT}"
            echo "run_pass_gate=${RUN_PASS}"
            echo "run_script_checks=${RUN_SCRIPTS}"
            echo "run_tests=${RUN_TESTS}"
            echo "run_cli_smoke=${RUN_SMOKE}"
            echo "run_nir_gate=${RUN_NIR}"
            echo "run_multi_os=${RUN_MULTI}"
          } >> "$GITHUB_OUTPUT"

          echo "Resolved lane=${LANE}"
          echo "  security=${RUN_SECURITY} lint=${RUN_LINT} pass_gate=${RUN_PASS} scripts=${RUN_SCRIPTS}"
          echo "  tests=${RUN_TESTS} smoke=${RUN_SMOKE} nir=${RUN_NIR} multi_os=${RUN_MULTI}"

  # Step 1: Security & Lint
  security-check:
    name: 🔒 Security Check
    needs: [changes]
    if: needs.changes.outputs.run_security == 'true'
    uses: ./.github/workflows/reusable-security-check.yml

  lint-format:
    name: 📋 Lint & Format
    needs: [changes]
    if: needs.changes.outputs.run_lint == 'true'
    uses: ./.github/workflows/reusable-lint-format.yml
    with:
      os: ubuntu-latest
      exclude_crates: "fission-signatures,fission-dioxus"

  # scripts/ci-only / scripts-only: syntax + owner boundary scripts (no cargo test matrix)
  script-checks:
    name: 🧰 Script Checks
    needs: [changes]
    if: needs.changes.outputs.run_script_checks == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          lfs: false
          submodules: false

      - name: Python syntax (scripts/)
        shell: bash
        run: |
          set -euo pipefail
          mapfile -t py < <(find scripts -type f -name '*.py' 2>/dev/null || true)
          if [ "${#py[@]}" -eq 0 ]; then
            echo "No Python scripts under scripts/"
            exit 0
          fi
          python3 -m py_compile "${py[@]}"
          echo "✅ py_compile ok (${#py[@]} files)"

      - name: Shell syntax (scripts/**/*.sh)
        shell: bash
        run: |
          set -euo pipefail
          mapfile -t shs < <(find scripts -type f -name '*.sh' 2>/dev/null || true)
          if [ "${#shs[@]}" -eq 0 ]; then
            echo "No shell scripts under scripts/"
            exit 0
          fi
          for f in "${shs[@]}"; do
            bash -n "$f"
          done
          echo "✅ bash -n ok (${#shs[@]} files)"

      - name: Workflow YAML parse (.github/workflows)
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from pathlib import Path
          try:
              import yaml
          except ImportError:
              import subprocess, sys
              subprocess.check_call([sys.executable, "-m", "pip", "install", "--quiet", "pyyaml"])
              import yaml
          errors = 0
          for p in sorted(Path(".github/workflows").glob("*.yml")):
              try:
                  yaml.safe_load(p.read_text())
                  print("OK", p)
              except Exception as e:
                  print("FAIL", p, e)
                  errors += 1
          raise SystemExit(errors)
          PY

  # Anti-overfitting / owner-boundary lint
  pass-gate-lint:
    name: 🛡️ Pass-Gate Lint (anti-overfitting)
    needs: [changes]
    if: needs.changes.outputs.run_pass_gate == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          lfs: false
          submodules: false

      - name: Check for function/address-specific patterns in NIR pipeline
        run: |
          set -euo pipefail
          PATTERN_HITS=$(grep -rn \
            -e 'func_name\s*==' \
            -e 'func_name\.contains' \
            -e 'function_name.*==\|==.*function_name' \
            -e 'addr\s*==\s*0x[0-9a-fA-F]' \
            crates/fission-pcode/src/midend/structuring/ \
            crates/fission-pcode/src/midend/normalize/ \
            crates/fission-midend-structuring/src/ \
            crates/fission-midend-normalize/src/ 2>/dev/null || true)
          if [ -n "$PATTERN_HITS" ]; then
            echo "❌ Function/address-specific pattern detected in NIR pipeline:"
            echo "$PATTERN_HITS"
            exit 1
          fi
          echo "✅ No function/address-specific patterns found in NIR pipeline."

      - name: Verify MAX_STRUCTURING_PASSES constant is declared
        run: |
          set -euo pipefail
          if ! grep -q 'MAX_STRUCTURING_PASSES' crates/fission-pcode/src/midend/pass/manager.rs; then
            echo "❌ MAX_STRUCTURING_PASSES constant missing from midend/pass/manager.rs"
            exit 1
          fi
          CAP=$(grep 'MAX_STRUCTURING_PASSES.*usize.*=' crates/fission-pcode/src/midend/pass/manager.rs \
                | grep -oE '[0-9]+' | head -1)
          echo "✅ MAX_STRUCTURING_PASSES = ${CAP} (current cap)."

      - name: Owner boundary scan (ADR 0008 / 0011 / 0012)
        run: |
          set -euo pipefail
          chmod +x scripts/check/owner_boundaries.sh
          ./scripts/check/owner_boundaries.sh

      - name: Enforce Targeted Tests for NIR/Render Changes
        if: github.event_name == 'pull_request' && needs.changes.outputs.run_tests == 'true'
        run: |
          set -euo pipefail
          git fetch origin ${{ github.base_ref }} --depth=1
          CHANGED=$(git diff origin/${{ github.base_ref }}...HEAD --name-only)
          if echo "$CHANGED" | grep -q -e "^crates/fission-pcode/src/midend/" \
              -e "^crates/fission-pcode/src/render/" \
              -e "^crates/fission-midend-structuring/" \
              -e "^crates/fission-midend-normalize/" \
              -e "^crates/fission-midend-core/"; then
            if echo "$CHANGED" | grep -q -e "tests/" -e ".*test" -e ".*_tests\.rs"; then
              echo "✅ Targeted tests included."
            elif git diff origin/${{ github.base_ref }}...HEAD -- \
                crates/fission-pcode/src/midend/ crates/fission-pcode/src/render/ \
                crates/fission-midend-structuring/ crates/fission-midend-normalize/ \
                crates/fission-midend-core/ \
                | grep -q "+.*#\[test\]"; then
              echo "✅ Inline tests added."
            else
              echo "❌ Targeted test missing for NIR/render/midend changes."
              exit 1
            fi
          else
            echo "ℹ️ No NIR/render/midend changes detected."
          fi

      - name: Enforce Sleigh Exact Match Parity
        if: github.event_name == 'pull_request' && needs.changes.outputs.run_tests == 'true'
        run: |
          set -euo pipefail
          if git diff origin/${{ github.base_ref }}...HEAD --name-only | grep -q -e "^crates/fission-sleigh/" -e "^utils/sleigh-specs/"; then
            echo "🔍 Sleigh changes detected. Parity enforcement active via fission-sleigh tests."
          else
            echo "ℹ️ No Sleigh changes detected."
          fi

  # Step 2: Core Tests (Linux)
  test-linux:
    name: 🧪 Tests (Linux)
    needs: [changes]
    if: needs.changes.outputs.run_tests == 'true'
    uses: ./.github/workflows/reusable-run-tests.yml
    with:
      os: ubuntu-latest
      # loader → analysis-db → midend/pcode stack (ADR 0010 + 0012 owners)
      crates: "fission-loader,fission-analysis-db,fission-midend-core,fission-midend-normalize,fission-midend-structuring,fission-pcode,fission-automation"
      profile: debug

  cli-smoke-linux:
    name: 🧭 CLI Smoke (Linux · PE sample)
    needs: [changes, test-linux]
    if: needs.changes.outputs.run_cli_smoke == 'true'
    uses: ./.github/workflows/reusable-cli-smoke.yml
    with:
      profile: debug

  nir-regression-gate:
    name: 🔬 NIR Regression Gate
    needs: [changes, test-linux]
    if: needs.changes.outputs.run_nir_gate == 'true'
    uses: ./.github/workflows/reusable-nir-regression-gate.yml

  # Multi-OS: main push + dispatch, rust/utils lane only
  build-macos:
    name: 🍎 Build (macOS)
    needs: [changes]
    if: needs.changes.outputs.run_multi_os == 'true'
    uses: ./.github/workflows/reusable-build-cli.yml
    with:
      os: macos-latest
      profile: release
      upload_artifact: false

  test-macos:
    name: 🧪 Tests (macOS)
    needs: [changes, build-macos]
    if: needs.changes.outputs.run_multi_os == 'true'
    uses: ./.github/workflows/reusable-run-tests.yml
    with:
      os: macos-latest
      crates: "fission-midend-structuring,fission-pcode,fission-automation,fission-loader"
      profile: debug

  build-windows:
    name: 🪟 Build (Windows)
    needs: [changes]
    if: needs.changes.outputs.run_multi_os == 'true'
    uses: ./.github/workflows/reusable-build-cli.yml
    with:
      os: windows-latest
      profile: release
      upload_artifact: false

  test-windows:
    name: 🧪 Tests (Windows)
    needs: [changes, build-windows]
    if: needs.changes.outputs.run_multi_os == 'true'
    uses: ./.github/workflows/reusable-run-tests.yml
    with:
      os: windows-latest
      crates: "fission-midend-structuring,fission-pcode,fission-decompiler,fission-automation"
      profile: debug
      timeout_minutes: 90

  # Final summary — lane-aware required jobs
  ci-summary:
    name: ✅ CI Summary
    needs:
      [
        changes,
        security-check,
        lint-format,
        script-checks,
        pass-gate-lint,
        test-linux,
        cli-smoke-linux,
        nir-regression-gate,
        test-macos,
        test-windows,
      ]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Check Status
        run: |
          set -euo pipefail
          LANE="${{ needs.changes.outputs.lane }}"
          echo "Lane: ${LANE}"

          require_if() {
            local enabled="$1"
            local name="$2"
            local result="$3"
            if [ "$enabled" != "true" ]; then
              echo "ℹ️  ${name} not required (result=${result})"
              return 0
            fi
            if [ "$result" = "skipped" ]; then
              echo "❌ ${name} was required but skipped"
              return 1
            fi
            if [ "$result" != "success" ]; then
              echo "❌ ${name} failed (result=${result})"
              return 1
            fi
            echo "✅ ${name}"
          }

          if [ "$LANE" = "docs" ]; then
            echo "✅ docs lane — short-circuit green"
            exit 0
          fi

          FAILED=0
          require_if "${{ needs.changes.outputs.run_security }}" "Security" "${{ needs.security-check.result }}" || FAILED=1
          require_if "${{ needs.changes.outputs.run_lint }}" "Lint/format" "${{ needs.lint-format.result }}" || FAILED=1
          require_if "${{ needs.changes.outputs.run_script_checks }}" "Script checks" "${{ needs.script-checks.result }}" || FAILED=1
          require_if "${{ needs.changes.outputs.run_pass_gate }}" "Pass-gate lint" "${{ needs.pass-gate-lint.result }}" || FAILED=1
          require_if "${{ needs.changes.outputs.run_tests }}" "Linux tests" "${{ needs.test-linux.result }}" || FAILED=1
          require_if "${{ needs.changes.outputs.run_cli_smoke }}" "CLI smoke" "${{ needs.cli-smoke-linux.result }}" || FAILED=1
          require_if "${{ needs.changes.outputs.run_nir_gate }}" "NIR regression gate" "${{ needs.nir-regression-gate.result }}" || FAILED=1
          require_if "${{ needs.changes.outputs.run_multi_os }}" "macOS tests" "${{ needs.test-macos.result }}" || FAILED=1
          require_if "${{ needs.changes.outputs.run_multi_os }}" "Windows tests" "${{ needs.test-windows.result }}" || FAILED=1

          if [ "$FAILED" -ne 0 ]; then
            exit 1
          fi
          echo "✅ Fast Gate passed for lane=${LANE}"
          echo "ℹ️  PR multi-OS is deferred to main L0 + L1 Heavy when applicable."
