name: Reusable Lint and Format

on:
  workflow_call:
    inputs:
      os:
        type: string
        required: false
        default: ubuntu-latest
      exclude_crates:
        type: string
        required: false
        default: ""
        description: "Crates to exclude from clippy (comma-separated)"

env:
  CARGO_TERM_COLOR: always

jobs:
  lint:
    runs-on: ${{ inputs.os }}
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
          lfs: false
          submodules: false

      - name: Setup Utils
        uses: ./.github/actions/setup-utils
      - name: Guard — crate sources must not reference benchmark fixtures
        run: python3 scripts/test/no_benchmark_fixture_refs_in_crates.py

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy,rustfmt

      - name: Cache Rust Build
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: fission-lint-${{ runner.os }}
          cache-on-failure: true

      - name: Check changed Rust formatting
        run: python3 scripts/ci/check_changed_rustfmt.py

      - name: Lint with Clippy (Deny Warnings)
        shell: bash
        run: |
          exclude_flags=()
          if [ -n "${{ inputs.exclude_crates }}" ]; then
            IFS=',' read -ra EX <<< "${{ inputs.exclude_crates }}"
            for c in "${EX[@]}"; do
              c="$(echo "$c" | tr -d '[:space:]')"
              [ -z "$c" ] && continue
              exclude_flags+=(--exclude "$c")
            done
          fi
          cargo clippy --workspace "${exclude_flags[@]}" --locked -- -D warnings -A clippy::style -A clippy::complexity
