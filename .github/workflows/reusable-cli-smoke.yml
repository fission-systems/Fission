name: Reusable CLI Smoke

on:
  workflow_call:
    inputs:
      binary_relative_path:
        type: string
        required: false
        default: /tmp/ci-fixtures/test_functions.exe
        description: "Path to sample binary (repo-relative); built on the runner if absent"
      profile:
        type: string
        required: false
        default: debug
        description: "Cargo profile for fission_cli (debug|release)"

env:
  CARGO_TERM_COLOR: always

jobs:
  cli-smoke:
    name: Smoke
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v7
        with:
          lfs: false

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      # Use apt-get directly: cache-apt-pkgs-action can restore without exposing mingw on PATH (exit 127).
      - name: Install MinGW-w64 (PE smoke fixture)
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-mingw-w64-x86-64
          command -v x86_64-w64-mingw32-gcc

      # CI fixture from .github/fixtures/test_functions.c — compiled on the runner (~150KiB PE)
      - name: Build PE smoke fixture (MinGW-w64)
        run: |
          set -euo pipefail
          OUT="${{ inputs.binary_relative_path }}"
          mkdir -p "$(dirname "${OUT}")"
          x86_64-w64-mingw32-gcc -O2 -g -m64 -static \
            .github/fixtures/test_functions.c \
            -o "${OUT}"
          test -s "${OUT}"

      - name: Build fission_cli
        run: |
          set -euo pipefail
          if [ "${{ inputs.profile }}" = "release" ]; then
            cargo build -p fission-cli --locked --release
          else
            cargo build -p fission-cli --locked
          fi

      - name: fission_cli info
        run: |
          set -euo pipefail
          BIN="${{ inputs.binary_relative_path }}"
          CLI="./target/${{ inputs.profile }}/fission_cli"
          "${CLI}" info "${BIN}"

      - name: fission_cli list --json (PE smoke)
        run: |
          set -euo pipefail
          BIN="${{ inputs.binary_relative_path }}"
          CLI="./target/${{ inputs.profile }}/fission_cli"
          "${CLI}" list "${BIN}" --json
          echo "list_ok"
          # NOTE: decomp requires Sleigh specs (utils/sleigh-specs) which are local-only.
          # Run 'fission_cli decomp' locally after: git lfs pull --include="utils/sleigh-specs/**"
