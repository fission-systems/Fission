name: Reusable CLI Smoke

on:
  workflow_call:
    inputs:
      binary_relative_path:
        type: string
        required: false
        default: /tmp/ci-fixtures/test_functions.exe
        description: "Path to sample binary; built on the runner if absent"
      profile:
        type: string
        required: false
        default: debug
        description: "Cargo profile for fission_cli (debug|release)"
      assets_tag:
        type: string
        required: false
        default: "assets-v1"
        description: "GitHub Release tag hosting sleigh-specs.tar.gz"

env:
  CARGO_TERM_COLOR: always

jobs:
  # Step 1: Download + cache Sleigh specs
  cli-smoke:
    name: Smoke
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      FISSION_SLEIGH_SPEC_DIR: ${{ github.workspace }}/utils/sleigh-specs
    steps:
      - uses: actions/checkout@v7
        with:
          lfs: false


      - name: Setup Utils
        uses: ./.github/actions/setup-utils
      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Restore Sleigh specs from cache
        uses: actions/cache@v4
        with:
          path: ~/.fission-sleigh-specs
          key: sleigh-specs-${{ inputs.assets_tag }}

      - name: Install MinGW-w64 (PE smoke fixture)
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-mingw-w64-x86-64
          command -v x86_64-w64-mingw32-gcc

      - name: Build PE smoke fixture (MinGW-w64)
        run: |
          set -euo pipefail
          OUT="${{ inputs.binary_relative_path }}"
          mkdir -p "$(dirname "${OUT}")"
          x86_64-w64-mingw32-gcc -O2 -g -m64 -static \
            .github/fixtures/test_functions.c \
            -o "${OUT}"
          test -s "${OUT}"

      - name: Build fission_cli
        run: |
          set -euo pipefail
          if [ "${{ inputs.profile }}" = "release" ]; then
            cargo build -p fission-cli --locked --release
          else
            cargo build -p fission-cli --locked
          fi

      - name: fission_cli info
        run: |
          set -euo pipefail
          BIN="${{ inputs.binary_relative_path }}"
          CLI="./target/${{ inputs.profile }}/fission_cli"
          "${CLI}" info "${BIN}"

      - name: fission_cli list --json (PE smoke)
        run: |
          set -euo pipefail
          BIN="${{ inputs.binary_relative_path }}"
          CLI="./target/${{ inputs.profile }}/fission_cli"
          "${CLI}" list "${BIN}" --json
          echo "list_ok"

      - name: fission_cli decomp --json (PE smoke)
        run: |
          set -euo pipefail
          BIN="${{ inputs.binary_relative_path }}"
          CLI="./target/${{ inputs.profile }}/fission_cli"
          ADDR="$("${CLI}" list "${BIN}" --json | python3 "${{ github.workspace }}/.github/scripts/pick_pe_smoke_decomp_addr.py")"
          echo "decomp addr: ${ADDR}"
          OUT=$("${CLI}" decomp "${BIN}" --addr "${ADDR}" --profile speed --timeout-ms 180000 --json)
          echo "$OUT" | python3 "${{ github.workspace }}/.github/scripts/check_decomp_output.py"
