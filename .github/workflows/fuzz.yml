name: Fuzz

on:
  push:
    branches: ["main"]
    paths:
      - "crates/fission-loader/**"
      - "crates/fission-pcode/**"
  schedule:
    # Run nightly at 02:00 UTC
    - cron: "0 2 * * *"
  workflow_dispatch:
    inputs:
      fuzz_duration:
        description: "Fuzz duration per target (seconds)"
        default: "120"
        required: false

env:
  CARGO_TERM_COLOR: always
  FUZZ_DURATION: ${{ github.event.inputs.fuzz_duration || '60' }}

permissions:
  contents: read

concurrency:
  group: fuzz-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  fuzz:
    name: Fuzz (${{ matrix.target }})
    runs-on: ubuntu-latest
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: fuzz_pe_parser
            crate_dir: crates/fission-loader
          - target: fuzz_elf_parser
            crate_dir: crates/fission-loader
          # fuzz_structuring: added once crates/fission-pcode/fuzz is scaffolded
          # - target: fuzz_structuring
          #   crate_dir: crates/fission-pcode

    steps:
      - uses: actions/checkout@v7

        with:
          lfs: false
          submodules: recursive


      - name: Setup Utils
        uses: ./.github/actions/setup-utils
      - name: Install Rust (nightly)
        uses: dtolnay/rust-toolchain@nightly
        with:
          components: llvm-tools-preview

      - name: Cache cargo-fuzz
        uses: actions/cache@v6
        with:
          path: ~/.cargo/bin/cargo-fuzz
          key: cargo-fuzz-${{ runner.os }}-v1

      - name: Install cargo-fuzz
        run: |
          if ! command -v cargo-fuzz &> /dev/null; then
            cargo install cargo-fuzz --locked
          fi

      - name: Generate seed corpus (best effort)
        run: |
          mkdir -p ${{ matrix.crate_dir }}/fuzz/corpus/fuzz_pe_parser
          mkdir -p ${{ matrix.crate_dir }}/fuzz/corpus/fuzz_elf_parser
          if [ -f scripts/test/gen_fuzz_corpus.sh ]; then
            chmod +x scripts/test/gen_fuzz_corpus.sh
            ./scripts/test/gen_fuzz_corpus.sh
          else
            echo "Seed helper script not found in repository; continuing with current corpus"
          fi

      - name: Run fuzzer — ${{ matrix.target }}
        working-directory: ${{ matrix.crate_dir }}
        run: |
          cargo fuzz run ${{ matrix.target }} -- \
            -max_total_time=${{ env.FUZZ_DURATION }} \
            -max_len=65536 \
            -print_final_stats=1
        # libfuzzer exits 0 on timeout, non-zero on crash
        continue-on-error: false

      - name: Upload crash artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: fuzz-crashes-${{ matrix.target }}-${{ github.sha }}
          path: |
            ${{ matrix.crate_dir }}/fuzz/artifacts/${{ matrix.target }}/
          retention-days: 30

      - name: Upload corpus
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: fuzz-corpus-${{ matrix.target }}-${{ github.sha }}
          path: |
            ${{ matrix.crate_dir }}/fuzz/corpus/${{ matrix.target }}/
          retention-days: 7
          if-no-files-found: ignore

