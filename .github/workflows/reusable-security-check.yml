name: Reusable Security Check

on:
  workflow_call:

env:
  CARGO_TERM_COLOR: always

jobs:
  security:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7
        with:
          lfs: false
          submodules: false

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup sccache
        uses: ./.github/actions/setup-sccache

      - name: Cache Rust Build
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: fission-security-${{ runner.os }}
          cache-on-failure: true

      - name: Verify Cargo.lock is consistent (--locked sanity)
        run: cargo metadata --locked --format-version 1 > /dev/null

      - name: Install cargo-deny
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-deny

      - name: "Cargo Deny: Check Advisories, Bans, Licenses, Sources"
        run: cargo deny check all

      - name: Install cargo-audit
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-audit

      - name: "Cargo Audit: Check for Known Security Vulnerabilities"
        run: |
          # --deny warnings: treat advisory warnings as errors
          # cranelift-jit 0.133.1 pins memmap2 0.2.x but only calls map_anon;
          # RUSTSEC-2026-0186 affects advise_range/flush_range APIs that are not
          # referenced by Cranelift. Remove this exception when Cranelift moves
          # to memmap2 >= 0.9.11.
          cargo audit --deny warnings --ignore RUSTSEC-2026-0186
