name: Reusable Security Check

on:
  workflow_call:
    inputs:
      check_npm:
        type: boolean
        required: false
        default: true
        description: "Also run npm audit for Tauri dependencies"

env:
  CARGO_TERM_COLOR: always

jobs:
  security:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-deny
        run: cargo install cargo-deny --locked

      - name: "Cargo Deny: Check Advisories, Bans, Licenses, Sources"
        run: cargo deny check all

      - name: "Cargo Audit: Check for Known Security Vulnerabilities"
        run: |
          cargo install cargo-audit
          cargo audit --deny warnings

      - name: NPM Security Audit (Tauri)
        if: ${{ inputs.check_npm }}
        run: |
          cd crates/fission-tauri
          npm ci --ignore-scripts
          npm audit --audit-level=high
