name: Run Canonical Corpus Benchmark

on:
  workflow_call:
    inputs:
      upload_artifacts:
        required: false
        type: boolean
        default: true
      baseline_branch:
        required: false
        type: string
        default: "main"

env:
  CARGO_TERM_COLOR: always
  GHIDRA_INSTALL_DIR: vendor/ghidra/ghidra_11.4.2_PUBLIC

jobs:
  benchmark:
    runs-on: ubuntu-latest
    name: Canonical Corpus Benchmark
    timeout-minutes: 120
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive
          lfs: true

      - name: Setup Java for Ghidra
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build outputs
        uses: Swatinem/rust-cache@v2

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install benchmark Python dependencies
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install -r benchmark/full_benchmark/requirements-benchmark.txt pyghidra

      - name: Build fission-cli (release)
        run: cargo build -p fission-cli --locked --release

      - name: Run advisory smoke corpus benchmark
        id: benchmark
        run: |
          OUT_DIR="benchmark/artifacts/full_benchmark/ci-heavy-smoke-balanced-latest"
          python3 benchmark/full_benchmark/full_decomp_benchmark.py \
            --corpus-manifest benchmark/config/benchmark_corpus/smoke_corpus.json \
            --fission-bin target/release/fission_cli \
            --ghidra-dir "$GHIDRA_INSTALL_DIR" \
            --output-dir "$OUT_DIR"
          echo "output_dir=$OUT_DIR" >> "$GITHUB_OUTPUT"

      - name: Publish benchmark summary to job summary
        run: |
          python3 - <<'PY'
          import json
          import os
          from pathlib import Path

          output_dir = Path("${{ steps.benchmark.outputs.output_dir }}")
          summary = json.loads((output_dir / "benchmark_summary.json").read_text(encoding="utf-8"))
          corpus = summary.get("corpus_summary", {}) or {}
          blockers = summary.get("promotion_blockers", []) or []
          arch = summary.get("arch_summary", {}) or {}

          lines = [
              "## Canonical Corpus Benchmark",
              "",
              f"- benchmark status: {corpus.get('status', 'unknown')}",
              f"- gate mode: {summary.get('gate_mode', 'unknown')}",
              f"- release promotion eligibility: {summary.get('release_promotion_allowed', False)}",
              f"- comparable to baseline: {summary.get('comparable_to_baseline', False)}",
              f"- baseline artifact: {summary.get('baseline_artifact') or 'none'}",
              "",
              "### x86 / x64 Split",
              "",
          ]
          for arch_name in ("x86", "x64"):
              payload = arch.get(arch_name, {}) or {}
              lines.append(
                  f"- {arch_name}: binaries={payload.get('binary_count', 0)}, "
                  f"weighted_avg_normalized_similarity={payload.get('weighted_avg_normalized_similarity', 0.0):.3f}"
              )
          if blockers:
              lines.extend(["", "### Promotion Blockers", ""])
              lines.extend([f"- {item}" for item in blockers[:20]])

          summary_path = os.environ["GITHUB_STEP_SUMMARY"]
          with open(summary_path, "a", encoding="utf-8") as handle:
              handle.write("\n".join(lines) + "\n")
          PY

      - name: Upload benchmark artifacts
        if: inputs.upload_artifacts
        uses: actions/upload-artifact@v4
        with:
          name: canonical-corpus-benchmark-${{ github.sha }}
          path: ${{ steps.benchmark.outputs.output_dir }}
          retention-days: 30
          if-no-files-found: warn
