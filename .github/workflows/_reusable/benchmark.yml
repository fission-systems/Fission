name: Run Benchmarks

on:
  workflow_call:
    inputs:
      upload_artifacts:
        required: false
        type: boolean
        default: true
      baseline_branch:
        required: false
        type: string
        default: 'main'

jobs:
  benchmark:
    runs-on: ubuntu-latest
    name: Performance Benchmark
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 50
          lfs: true

      - name: Setup Rust
        uses: ./.github/actions/setup-rust
        with:
          components: rustfmt,clippy

      - name: Install Python dependencies
        run: |
          python3 -m pip install --upgrade pip

      - name: Run Benchmarks (Current)
        id: current
        run: |
          mkdir -p benchmark/results
          
          echo "Running fission-analysis benchmarks..."
          cargo bench -p fission-analysis --bench benchmark --no-fail-fast -- --output-format bencher 2>&1 | \
            tee benchmark/results/current_${{ github.sha }}.txt
          
          echo "current_result=benchmark/results/current_${{ github.sha }}.txt" >> $GITHUB_OUTPUT
        env:
          CARGO_INCREMENTAL: 0
          RUST_BACKTRACE: 1
          CARGO_TERM_COLOR: always

      - name: Generate Benchmark Report
        id: report
        run: |
          python3 scripts/benchmark/analyze_benchmark.py \
            --current benchmark/results/current_${{ github.sha }}.txt \
            --output benchmark/results/report_${{ github.sha }}.md \
            --commit ${{ github.sha }} \
            --history-dir benchmark/history
          
          echo "report_file=benchmark/results/report_${{ github.sha }}.md" >> $GITHUB_OUTPUT

      - name: Comment PR with Benchmark Results
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const reportPath = '${{ steps.report.outputs.report_file }}';
            
            if (!fs.existsSync(reportPath)) {
              console.log('Report file not found, skipping comment');
              return;
            }
            
            const report = fs.readFileSync(reportPath, 'utf8');
            
            // Check if report has regressions or is notable
            const hasRegressions = report.includes('🔴') || report.includes('Performance Regressions');
            
            if (hasRegressions) {
              github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: report
              });
            } else {
              console.log('No significant regressions detected');
            }

      - name: Store Benchmark Results
        if: inputs.upload_artifacts
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results-${{ github.sha }}
          path: benchmark/results/
          retention-days: 30

      - name: Update Performance History (main only)
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: |
          python3 scripts/benchmark/update_history.py \
            --result benchmark/results/current_${{ github.sha }}.txt \
            --commit ${{ github.sha }} \
            --branch ${{ github.ref }} \
            --timestamp $(date -u +%Y-%m-%dT%H:%M:%SZ) \
            --history-dir benchmark/history

      - name: Push Performance History
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: |
          git config user.name "GitHub Actions Bot"
          git config user.email "actions@github.com"
          
          if [ -d benchmark/history ]; then
            git add benchmark/history/ 2>/dev/null || true
            if git diff --cached --quiet; then
              echo "No history changes to commit"
            else
              git commit -m "chore: update benchmark history for ${{ github.sha }}"
              git push origin main || echo "Failed to push, might be a race condition"
            fi
          fi
        continue-on-error: true

