name: CI/CD Status Monitor

on:
  # Weekly on Monday at 09:00 UTC (reduced from daily)
  schedule:
    - cron: "0 9 * * 1"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  monitor:
    name: 📊 CI/CD Health Monitor
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          lfs: false

      - name: Fetch Workflow Run Stats
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          python3 << 'PYTHON'
          import json
          import subprocess
          import os

          def fetch_runs(workflow, limit=10):
              result = subprocess.run(
                  ["gh", "run", "list", "--workflow", workflow, "-L", str(limit),
                   "--json", "status,conclusion,durationMinutes,createdAt,displayTitle"],
                  capture_output=True, text=True, env={**os.environ}
              )
              if result.returncode != 0:
                  return []
              return json.loads(result.stdout)

          def summarize(label, runs):
              if not runs:
                  return f"### {label}\n- ⚠️ No runs found\n"
              total = len(runs)
              passed = sum(1 for r in runs if r.get("conclusion") == "success")
              failed = sum(1 for r in runs if r.get("conclusion") == "failure")
              rate = passed / total * 100 if total > 0 else 0
              avg_dur = sum(r.get("durationMinutes", 0) for r in runs) / total
              badges = "".join("🟢" if r.get("conclusion")=="success" else "🔴" if r.get("conclusion")=="failure" else "⚪" for r in runs)
              return (
                  f"### {label}\n"
                  f"- Success rate: **{rate:.0f}%** ({passed}/{total}), Failures: {failed}\n"
                  f"- Avg duration: **{avg_dur:.1f} min**\n"
                  f"- Last {total} runs: {badges}\n"
              )

          fast = fetch_runs("ci.yml")
          heavy = fetch_runs("ci-heavy.yml")
          cd = fetch_runs("cd.yml", limit=5)

          report = (
              "# 📊 CI/CD Weekly Health Report\n\n"
              f"Generated: $(date -u +'%Y-%m-%d %H:%M UTC')\n\n"
              + summarize("🟢 Fast Gate (ci.yml) — PR/push", fast)
              + "\n"
              + summarize("🔵 Heavy Validation (ci-heavy.yml) — nightly", heavy)
              + "\n"
              + summarize("🚀 CD Release (cd.yml) — tag-triggered", cd)
              + "\n---\n[View all workflow runs](https://github.com/${{ github.repository }}/actions)\n"
          )

          with open(os.environ["GITHUB_STEP_SUMMARY"], "a") as f:
              f.write(report)

          print(report)
          PYTHON
