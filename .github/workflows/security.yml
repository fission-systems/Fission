name: Security Scan

on:
    push:
        branches: ["main"]
    pull_request:
        branches: ["main"]
    schedule:
        - cron: "30 1 * * 0" # 매주 일요일 새벽 실행

permissions:
    contents: read
    security-events: write # CodeQL 결과를 Security 탭에 업로드하기 위함

jobs:
    codeql:
        name: CodeQL Analysis
        runs-on: ubuntu-latest
        permissions:
            actions: read
            contents: read
            security-events: write

        strategy:
            fail-fast: false
            matrix:
                language: ["cpp"] # Rust는 아직 CodeQL 공식 지원이 제한적임

        steps:
            - name: Checkout repository
              uses: actions/checkout@v4

            - name: Initialize CodeQL
              uses: github/codeql-action/init@v4
              with:
                  languages: ${{ matrix.language }}
                  # C++ 빌드 설정을 자동 감지하도록 함

            - name: Autobuild
              uses: github/codeql-action/autobuild@v4

            - name: Perform CodeQL Analysis
              uses: github/codeql-action/analyze@v4
              with:
                  category: "/language:${{matrix.language}}"

    trivy:
        name: Trivy Vulnerability Scan
        runs-on: ubuntu-latest
        steps:
            - name: Checkout repository
              uses: actions/checkout@v4

            - name: Run Trivy vulnerability scanner (FileSystem)
              uses: aquasecurity/trivy-action@master
              with:
                  scan-type: "fs"
                  scan-ref: "."
                  trivy-config: trivy.yaml # 설정 파일이 없으면 기본 설정 사용
                  format: "sarif"
                  output: "trivy-results.sarif"
                  exit-code: "0" # 취약점 발견 시에도 실패하지 않음 (1로 설정 시 CI 실패)
                  ignore-unfixed: true
                  vuln-type: "os,library"
                  severity: "CRITICAL,HIGH"

            - name: Upload Trivy Scan Results
              uses: github/codeql-action/upload-sarif@v4
              if: always() # 스캔이 실패해도 결과는 업로드
              with:
                  sarif_file:
                      "trivy-results.sarif" # 만약 sarif 포맷 출력이 필요하다면 format을 'sarif'로 변경해야 함.
                      # 여기서는 로그 확인용으로 'table'을 썼으므로 이 단계는 주석 처리하거나 format을 변경해야 함.
