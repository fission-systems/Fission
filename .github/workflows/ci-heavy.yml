name: CI Heavy Validation

on:
  # Nightly at 02:30 UTC — does not run on every push; Fast Gate (ci.yml) covers that.
  schedule:
    - cron: "30 2 * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-heavy-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  CARGO_TERM_COLOR: always

jobs:
  # Step 1: Corpus Validation (~15 min)
  corpus-validation:
    name: 📦 Corpus Validation
    uses: ./.github/workflows/reusable-corpus-validation.yml

  # Step 2: Full Test Suite (Linux, ~25 min)
  test-linux-full:
    name: 🧪 Full Tests (Linux)
    needs: corpus-validation
    uses: ./.github/workflows/reusable-run-tests.yml
    with:
      os: ubuntu-latest
      crates: ""
      profile: debug
      exclude_crates: "fission-tauri,fission-static"

  test-linux-static:
    name: 🧪 Tests (fission-static)
    needs: corpus-validation
    uses: ./.github/workflows/reusable-run-tests.yml
    with:
      os: ubuntu-latest
      crates: "fission-static"
      profile: debug

  # Step 3: Build & Test (Windows, ~20 min)
  build-windows-heavy:
    name: 🪟 Heavy Build & Test (Windows)
    needs: corpus-validation
    uses: ./.github/workflows/reusable-build-cli.yml
    with:
      os: windows-latest
      profile: release
      upload_artifact: true

  test-windows-heavy:
    name: 🧪 Heavy Tests (Windows)
    needs: build-windows-heavy
    uses: ./.github/workflows/reusable-run-tests.yml
    with:
      os: windows-latest
      crates: "fission-pcode,fission-decompiler,fission-automation"
      profile: release
      timeout_minutes: 120

  # Step 4: Build & Test (macOS, ~20 min)
  build-macos-heavy:
    name: 🍎 Heavy Build & Test (macOS)
    needs: corpus-validation
    uses: ./.github/workflows/reusable-build-cli.yml
    with:
      os: macos-latest
      profile: release
      upload_artifact: true

  # Step 5: Build Tauri (~15 min parallel)
  build-tauri-linux:
    name: 🖥️ Build Tauri (Linux)
    needs: corpus-validation
    uses: ./.github/workflows/reusable-build-tauri.yml
    with:
      os: ubuntu-latest

  # Step 6: Automation NIR-Check (~45 min)
  nir-check:
    name: 🔬 Automation NIR-Check
    needs: corpus-validation
    uses: ./.github/workflows/reusable-nir-check.yml
    with:
      run_profile: fast
      functions_limit: "10"
      update_latest: false

  # Step 7: Performance Benchmarking (~30 min)
  benchmark:
    name: 📊 Performance Benchmark
    needs: corpus-validation
    uses: ./.github/workflows/reusable-benchmark.yml
    with:
      upload_artifacts: true
      baseline_branch: 'main'

  # Final summary
  heavy-summary:
    name: ✅ Heavy Validation Summary
    needs:
      - corpus-validation
      - test-linux-full
      - test-linux-static
      - build-macos-heavy
      - test-windows-heavy
      - build-tauri-linux
      - nir-check
      - benchmark
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Check Status
        run: |
          FAILED=0
          
          if [ "${{ needs.corpus-validation.result }}" != "success" ]; then
            echo "❌ Corpus validation failed"
            FAILED=1
          fi
          if [ "${{ needs.test-linux-full.result }}" != "success" ]; then
            echo "❌ Linux full tests failed"
            FAILED=1
          fi
          if [ "${{ needs.test-linux-static.result }}" != "success" ]; then
            echo "❌ Linux fission-static tests failed"
            FAILED=1
          fi
          if [ "${{ needs.build-macos-heavy.result }}" != "success" ]; then
            echo "❌ macOS heavy build failed"
            FAILED=1
          fi
          if [ "${{ needs.test-windows-heavy.result }}" != "success" ]; then
            echo "❌ Windows heavy tests failed"
            FAILED=1
          fi
          if [ "${{ needs.build-tauri-linux.result }}" != "success" ]; then
            echo "❌ Tauri build failed"
            FAILED=1
          fi
          if [ "${{ needs.nir-check.result }}" != "success" ]; then
            echo "❌ NIR-Check failed"
            FAILED=1
          fi
          if [ "${{ needs.benchmark.result }}" != "success" ]; then
            echo "❌ Performance benchmark failed"
            FAILED=1
          fi
          
          if [ $FAILED -eq 1 ]; then
            exit 1
          fi
          echo "✅ All heavy validation checks passed!"
