name: CI Heavy Validation

on:
  push:
    branches: ["main"]
  schedule:
    - cron: "30 2 * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-heavy-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  corpus-generalization-smoke-config:
    name: Corpus Generalization Smoke Config
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Validate corpus manifests and referenced binaries
        run: |
          python3 - <<'PY'
          import json
          from pathlib import Path

          repo = Path.cwd()
          manifests = [
              repo / "config/benchmark_corpus/smoke_corpus.json",
              repo / "config/benchmark_corpus/release_corpus.json",
          ]
          for manifest in manifests:
              payload = json.loads(manifest.read_text(encoding="utf-8"))
              entries = payload.get("entries", [])
              assert isinstance(entries, list) and entries, f"empty entries: {manifest}"
              seen = set()
              for entry in entries:
                  entry_id = entry["id"]
                  assert entry_id not in seen, f"duplicate id {entry_id} in {manifest}"
                  seen.add(entry_id)
                  binary = Path(entry["binary_path"])
                  assert binary.is_file(), f"missing binary {binary}"
              print(f"{manifest.name}: {len(entries)} entries OK")
          PY

  linux-full-validation:
    name: Linux Full Validation
    runs-on: ubuntu-latest
    timeout-minutes: 70

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache Rust build outputs
        uses: Swatinem/rust-cache@v2

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: crates/fission-tauri/package-lock.json

      - name: Install system dependencies (Linux/Tauri)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libssl-dev \
            librsvg2-dev \
            libayatana-appindicator3-dev \
            build-essential \
            file

      - name: Full Rust test suite (excluding tauri crate)
        run: |
          cargo test --workspace --exclude fission-tauri --exclude fission-static --locked --verbose
          cargo test -p fission-static --locked --verbose

      - name: Build Tauri frontend
        run: |
          cd crates/fission-tauri
          npm ci
          npm run build

  windows-heavy-build:
    name: Windows Heavy Build/Test
    runs-on: windows-latest
    timeout-minutes: 70

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build outputs
        uses: Swatinem/rust-cache@v2

      - name: Build fission-cli (release)
        run: cargo build -p fission-cli --locked --release

      - name: Run Windows core tests
        run: cargo test -p fission-pcode -p fission-automation --locked --release --verbose

  automation-nir-check:
    name: Automation Nir-Check + Artifacts
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build outputs
        uses: Swatinem/rust-cache@v2

      - name: Install system dependencies (Linux/Tauri)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libssl-dev \
            librsvg2-dev \
            libayatana-appindicator3-dev \
            build-essential \
            file

      - name: Build fission-cli (release)
        run: cargo build -p fission-cli --locked --release

      - name: Run automation crate tests
        run: cargo test -p fission-automation --locked --verbose

      # Smoke the real nir-check lane (no committed baseline in CI → perf gate skipped; --no-update-latest avoids touching latest/).
      - name: Run fission-automation nir-check (fast profile)
        run: |
          cargo run -p fission-automation --release -- nir-check \
            --lane nir \
            --no-build \
            --no-update-latest \
            --fission-bin target/release/fission_cli \
            --run-profile fast \
            --functions-limit 10

      - name: Upload automation artifacts
        uses: actions/upload-artifact@v4
        with:
          name: automation-nir-check-${{ github.sha }}
          path: artifacts/fission-automation/
          retention-days: 14
          if-no-files-found: warn
