name: CI Heavy Validation

on:
  push:
    branches: ["main"]
  schedule:
    - cron: "30 2 * * *"
  workflow_dispatch:

concurrency:
  group: ci-heavy-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  linux-full-validation:
    name: Linux Full Validation
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache Rust build outputs
        uses: Swatinem/rust-cache@v2

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: crates/fission-tauri/package-lock.json

      - name: Install system dependencies (Linux/Tauri)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libssl-dev \
            librsvg2-dev \
            libayatana-appindicator3-dev \
            build-essential \
            file

      - name: Full Rust test suite (excluding tauri crate)
        run: |
          cargo test --workspace --exclude fission-tauri --exclude fission-static --verbose
          cargo test -p fission-static --verbose

      - name: Build Tauri frontend
        run: |
          cd crates/fission-tauri
          npm ci
          npm run build

  windows-heavy-build:
    name: Windows Heavy Build/Test
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build outputs
        uses: Swatinem/rust-cache@v2

      - name: Build fission-cli (release)
        run: cargo build -p fission-cli --release

      - name: Run Windows core tests
        run: cargo test -p fission-pcode -p fission-automation --release --verbose

  automation-nir-check:
    name: Automation Nir-Check + Artifacts
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build outputs
        uses: Swatinem/rust-cache@v2

      - name: Install system dependencies (Linux/Tauri)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libssl-dev \
            librsvg2-dev \
            libayatana-appindicator3-dev \
            build-essential \
            file

      - name: Build fission-cli (release)
        run: cargo build -p fission-cli --release

      - name: Run automation crate tests
        run: cargo test -p fission-automation --verbose

      - name: Upload automation artifacts
        uses: actions/upload-artifact@v4
        with:
          name: automation-nir-check-${{ github.sha }}
          path: artifacts/fission-automation/
          retention-days: 14
          if-no-files-found: warn
