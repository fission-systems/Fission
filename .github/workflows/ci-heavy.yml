name: CI Heavy Validation

on:
  # L1 release gate: run on every main push so release-tag can require a green
  # heavy run for that SHA (see docs/CI_RELEASE_GATES.md). Nightly remains as a
  # scheduled safety net; Fast Gate (ci.yml) still owns PR latency.
  push:
    branches: ["main"]
  schedule:
    - cron: "30 2 * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-heavy-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  CARGO_TERM_COLOR: always

jobs:


  # Step 2: Full Test Suite (Linux, ~25 min)
  test-linux-full:
    name: 🧪 Full Tests (Linux)
    uses: ./.github/workflows/reusable-run-tests.yml
    with:
      os: ubuntu-latest
      crates: ""
      profile: debug
      # fission-static: separate job. fission-dioxus: needs GUI/sys libs (libxdo,
      # webkit) not present on default runners — not part of decompiler release gate.
      exclude_crates: "fission-static,fission-dioxus"

  test-linux-static:
    name: 🧪 Tests (fission-static)
    uses: ./.github/workflows/reusable-run-tests.yml
    with:
      os: ubuntu-latest
      crates: "fission-static"
      profile: debug

  # Step 3: Build & Test (Windows, ~20 min)
  build-windows-heavy:
    name: 🪟 Heavy Build & Test (Windows)
    uses: ./.github/workflows/reusable-build-cli.yml
    with:
      os: windows-latest
      profile: release
      upload_artifact: true

  test-windows-heavy:
    name: 🧪 Heavy Tests (Windows)
    needs: build-windows-heavy
    uses: ./.github/workflows/reusable-run-tests.yml
    with:
      os: windows-latest
      crates: "fission-pcode,fission-decompiler,fission-automation"
      profile: release
      timeout_minutes: 120

  # Step 4: Build & Test (macOS, ~20 min)
  build-macos-heavy:
    name: 🍎 Heavy Build & Test (macOS)
    uses: ./.github/workflows/reusable-build-cli.yml
    with:
      os: macos-latest
      profile: release
      upload_artifact: true

  # Step 5: Automation NIR-Check (~45 min)
  nir-check:
    name: 🔬 Automation NIR-Check
    uses: ./.github/workflows/reusable-nir-check.yml
    with:
      run_profile: fast
      functions_limit: "10"
      update_latest: false

  # Step 8: Miri — unsafe UB detection (~45 min, nightly Rust)
  miri-check:
    name: 🧠 Miri UB Check
    uses: ./.github/workflows/reusable-miri.yml
    with:
      crates: "fission-pcode,fission-loader"

  # Step 9: Code Coverage (~30 min)
  coverage:
    name: 📈 Code Coverage
    uses: ./.github/workflows/reusable-coverage.yml
    with:
      crates: "fission-pcode,fission-loader,fission-automation"
      warn_threshold_pct: 60

  # Step 10: MSRV validation
  msrv-check:
    name: 🦀 MSRV Check
    uses: ./.github/workflows/reusable-msrv.yml
    with:
      crates: "fission-pcode,fission-loader,fission-decompiler,fission-automation"

  # Final summary
  heavy-summary:
    name: ✅ Heavy Validation Summary
    needs:
      - test-linux-full
      - test-linux-static
      - build-macos-heavy
      - test-windows-heavy
      - nir-check
      - miri-check
      - coverage
      - msrv-check
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Check Status
        run: |
          FAILED=0


          if [ "${{ needs.test-linux-full.result }}" != "success" ]; then
            echo "❌ Linux full tests failed"
            FAILED=1
          fi
          if [ "${{ needs.test-linux-static.result }}" != "success" ]; then
            echo "❌ Linux fission-static tests failed"
            FAILED=1
          fi
          if [ "${{ needs.build-macos-heavy.result }}" != "success" ]; then
            echo "❌ macOS heavy build failed"
            FAILED=1
          fi
          if [ "${{ needs.test-windows-heavy.result }}" != "success" ]; then
            echo "❌ Windows heavy tests failed"
            FAILED=1
          fi

          if [ "${{ needs.nir-check.result }}" != "success" ]; then
            echo "❌ NIR-Check failed"
            FAILED=1
          fi

          if [ "${{ needs.miri-check.result }}" != "success" ]; then
            echo "❌ Miri UB check failed — unsafe code undefined behavior detected"
            FAILED=1
          fi
          # Coverage is warn-only — do not block on coverage result
          if [ "${{ needs.coverage.result }}" == "failure" ]; then
            echo "⚠️ Coverage job encountered an error (non-blocking)"
          fi
          if [ "${{ needs.msrv-check.result }}" != "success" ]; then
            echo "❌ MSRV check failed — codebase breaks on declared minimum Rust version"
            FAILED=1
          fi

          if [ $FAILED -eq 1 ]; then
            exit 1
          fi
          echo "✅ All heavy validation checks passed!"
          echo ""
          echo "ℹ️  Miri, Coverage, and MSRV results are available in job artifacts."

