name: CI Heavy Validation

on:
  # L1 release gate on every main push (decompiler-critical jobs).
  # Nightly / manual dispatch also run the full workspace suite + Miri.
  # Policy: docs/CI_RELEASE_GATES.md
  push:
    branches: ["main"]
  schedule:
    - cron: "30 2 * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-heavy-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  CARGO_TERM_COLOR: always

jobs:
  # ── L1 release-critical (every main push + nightly + dispatch) ────────────
  test-linux-release-critical:
    name: 🧪 Release-Critical Tests (Linux)
    uses: ./.github/workflows/reusable-run-tests.yml
    with:
      os: ubuntu-latest
      # Decompiler / CLI stack + midend free-fn owners + static facts.
      # Single nextest process (reusable-run-tests multi -p) — no separate static job.
      crates: "fission-core,fission-midend-core,fission-midend-normalize,fission-midend-structuring,fission-loader,fission-pcode,fission-static,fission-decompiler,fission-automation,fission-cli,fission-analysis-db,fission-signatures"
      profile: debug

  build-windows-heavy:
    name: 🪟 Heavy Build & Test (Windows)
    uses: ./.github/workflows/reusable-build-cli.yml
    with:
      os: windows-latest
      profile: release
      upload_artifact: true

  test-windows-heavy:
    name: 🧪 Heavy Tests (Windows)
    needs: build-windows-heavy
    uses: ./.github/workflows/reusable-run-tests.yml
    with:
      os: windows-latest
      crates: "fission-midend-structuring,fission-pcode,fission-decompiler,fission-automation"
      profile: release
      timeout_minutes: 120

  build-macos-heavy:
    name: 🍎 Heavy Build (macOS)
    uses: ./.github/workflows/reusable-build-cli.yml
    with:
      os: macos-latest
      profile: release
      upload_artifact: true

  nir-check:
    name: 🔬 Automation NIR-Check
    uses: ./.github/workflows/reusable-nir-check.yml
    with:
      run_profile: fast
      functions_limit: "10"
      update_latest: false

  msrv-check:
    name: 🦀 MSRV Check
    uses: ./.github/workflows/reusable-msrv.yml
    with:
      crates: "fission-midend-structuring,fission-pcode,fission-loader,fission-decompiler,fission-automation"

  # ── Extended (nightly + manual only; not required for main-push L1) ───────
  test-linux-full:
    name: 🧪 Full Tests (Linux · extended)
    if: github.event_name != 'push'
    uses: ./.github/workflows/reusable-run-tests.yml
    with:
      os: ubuntu-latest
      crates: ""
      profile: debug
      # dioxus needs GUI sys libs; static is covered by its own job.
      exclude_crates: "fission-static,fission-dioxus"

  miri-check:
    name: 🧠 Miri UB Check (extended)
    if: github.event_name != 'push'
    uses: ./.github/workflows/reusable-miri.yml
    with:
      crates: "fission-pcode,fission-loader"

  coverage:
    name: 📈 Code Coverage (extended)
    if: github.event_name != 'push'
    uses: ./.github/workflows/reusable-coverage.yml
    with:
      crates: "fission-pcode,fission-loader,fission-automation"
      warn_threshold_pct: 60

  # Final summary — release-critical always; extended only when not skipped
  heavy-summary:
    name: ✅ Heavy Validation Summary
    needs:
      - test-linux-release-critical
      - build-macos-heavy
      - test-windows-heavy
      - nir-check
      - msrv-check
      - test-linux-full
      - miri-check
      - coverage
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Check Status
        run: |
          set -euo pipefail
          FAILED=0

          require_success() {
            local name="$1"
            local result="$2"
            if [ "$result" != "success" ]; then
              echo "❌ ${name} failed (result=${result})"
              FAILED=1
            else
              echo "✅ ${name}"
            fi
          }

          require_success_or_skipped() {
            local name="$1"
            local result="$2"
            if [ "$result" = "skipped" ]; then
              echo "ℹ️  ${name} skipped (extended-only)"
            elif [ "$result" != "success" ]; then
              echo "❌ ${name} failed (result=${result})"
              FAILED=1
            else
              echo "✅ ${name}"
            fi
          }

          require_success "Release-critical Linux tests" "${{ needs.test-linux-release-critical.result }}"
          require_success "macOS heavy build" "${{ needs.build-macos-heavy.result }}"
          require_success "Windows heavy tests" "${{ needs.test-windows-heavy.result }}"
          require_success "NIR-Check" "${{ needs.nir-check.result }}"
          require_success "MSRV" "${{ needs.msrv-check.result }}"

          require_success_or_skipped "Full Linux tests (extended)" "${{ needs.test-linux-full.result }}"
          require_success_or_skipped "Miri (extended)" "${{ needs.miri-check.result }}"

          # Coverage is warn-only even when run
          if [ "${{ needs.coverage.result }}" = "failure" ]; then
            echo "⚠️ Coverage job encountered an error (non-blocking)"
          elif [ "${{ needs.coverage.result }}" = "skipped" ]; then
            echo "ℹ️  Coverage skipped (extended-only)"
          else
            echo "ℹ️  Coverage finished (${{ needs.coverage.result }})"
          fi

          if [ "$FAILED" -eq 1 ]; then
            exit 1
          fi
          echo "✅ Heavy validation checks passed for this event!"
          echo "ℹ️  Main push L1 = release-critical jobs. Full/Miri/coverage run on nightly or dispatch."
