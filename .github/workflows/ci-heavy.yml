name: CI Heavy Validation

on:
  push:
    branches: ["main"]
  schedule:
    - cron: "30 2 * * *"
  workflow_dispatch:

concurrency:
  group: ci-heavy-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  linux-full-validation:
    name: Linux Full Validation
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache Rust build outputs
        uses: Swatinem/rust-cache@v2

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: crates/fission-tauri/package-lock.json

      - name: Install system dependencies (Linux/Tauri)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libssl-dev \
            librsvg2-dev \
            libayatana-appindicator3-dev \
            build-essential \
            file

      - name: Build Decompiler
        run: |
          cmake -S ghidra_decompiler -B ghidra_decompiler/build -DCMAKE_BUILD_TYPE=Release
          cmake --build ghidra_decompiler/build --config Release

      - name: Full Rust test suite (excluding tauri crate)
        run: cargo test --workspace --exclude fission-tauri --verbose

      - name: Build Tauri frontend
        run: |
          cd crates/fission-tauri
          npm ci
          npm run build

      - name: Fission decompilation smoke test
        run: |
          chmod +x scripts/test/decomp_smoke_ci.sh
          ./scripts/test/decomp_smoke_ci.sh

  windows-heavy-build:
    name: Windows Heavy Build/Test
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build outputs
        uses: Swatinem/rust-cache@v2

      - name: Build Decompiler (Windows)
        shell: pwsh
        run: |
          vcpkg install zlib:x64-windows
          cd ghidra_decompiler
          if (!(Test-Path build)) { New-Item -ItemType Directory -Path build | Out-Null }
          cd build
          cmake .. -DCMAKE_TOOLCHAIN_FILE="$env:VCPKG_INSTALLATION_ROOT/scripts/buildsystems/vcpkg.cmake"
          cmake --build . --config Release

      - name: Build fission-cli (release)
        run: cargo build -p fission-cli --features native_decomp --release

      - name: Run Windows core tests
        run: cargo test -p fission-pcode -p fission-automation --release --verbose

  automation-nir-check:
    name: Automation Nir-Check + Artifacts
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build outputs
        uses: Swatinem/rust-cache@v2

      - name: Install system dependencies (Linux/Tauri)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libssl-dev \
            librsvg2-dev \
            libayatana-appindicator3-dev \
            build-essential \
            file

      - name: Build Decompiler
        run: |
          cmake -S ghidra_decompiler -B ghidra_decompiler/build -DCMAKE_BUILD_TYPE=Release
          cmake --build ghidra_decompiler/build --config Release

      - name: Build fission-cli (release)
        run: cargo build -p fission-cli --features native_decomp --release

      - name: Run nir-check lane=nir (mid)
        run: |
          cargo run -p fission-automation -- nir-check \
            --lane nir \
            --run-profile mid \
            --no-build \
            --fission-bin target/release/fission_cli \
            --update-latest false

      - name: Run nir-check lane=regression (full)
        run: |
          cargo run -p fission-automation -- nir-check \
            --lane regression \
            --run-profile full \
            --no-build \
            --fission-bin target/release/fission_cli \
            --update-latest false

      - name: Upload automation artifacts
        uses: actions/upload-artifact@v4
        with:
          name: automation-nir-check-${{ github.sha }}
          path: artifacts/fission-automation/
          retention-days: 14
          if-no-files-found: warn
