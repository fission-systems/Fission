name: Reusable NIR-Check Automation

on:
  workflow_call:
    inputs:
      run_profile:
        type: string
        required: false
        default: "fast"
        description: "NIR-Check profile: fast or full"
      functions_limit:
        type: string
        required: false
        default: "10"
        description: "Limit functions analyzed per binary"
      update_latest:
        type: boolean
        required: false
        default: false
        description: "Update latest baseline (caution: only on stable runs)"
      assets_tag:
        type: string
        required: false
        default: "assets-v1"

env:
  CARGO_TERM_COLOR: always

jobs:
  setup-utils:
    uses: ./.github/workflows/reusable-setup-sleigh.yml
    with:
      assets_tag: ${{ inputs.assets_tag }}

  nir-check:
    needs: setup-utils
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      FISSION_SLEIGH_SPEC_DIR: ${{ needs.setup-utils.outputs.sleigh_spec_dir }}
    steps:
      - uses: actions/checkout@v7
        with:
          lfs: false
          submodules: recursive

      - name: Restore utils from cache
        uses: actions/cache@v4
        with:
          path: ~/.fission-utils
          key: fission-utils-${{ inputs.assets_tag }}

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust Build
        uses: Swatinem/rust-cache@v2

      - name: Install MinGW-w64 (PE nir-lane fixture)
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-mingw-w64-x86-64
          command -v x86_64-w64-mingw32-gcc

      - name: Build PE nir-lane fixture (MinGW-w64)
        run: |
          set -euo pipefail
          OUT="/tmp/ci-fixtures/test_functions.exe"
          mkdir -p "$(dirname "${OUT}")"
          x86_64-w64-mingw32-gcc -O2 -g -m64 -static \
            .github/fixtures/test_functions.c \
            -o "${OUT}"
          test -s "${OUT}"

      - name: Build fission-cli (Release)
        run: cargo build -p fission-cli --locked --release

      - name: Run automation crate tests
        run: cargo test -p fission-automation --locked --verbose

      - name: Run NIR-Check Automation
        run: |
          cargo run -p fission-automation --release -- nir-check \
            --lane nir \
            --no-build \
            ${{ inputs.update_latest && '--update-latest' || '--no-update-latest' }} \
            --fission-bin target/release/fission_cli \
            --run-profile ${{ inputs.run_profile }} \
            --functions-limit ${{ inputs.functions_limit }}

      - name: Upload Automation Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: nir-check-artifacts-${{ github.sha }}
          path: /tmp/nir-check-artifacts/
          retention-days: 14
          if-no-files-found: warn
