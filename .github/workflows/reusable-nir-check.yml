name: Reusable NIR-Check Automation

on:
  workflow_call:
    inputs:
      run_profile:
        type: string
        required: false
        default: "fast"
        description: "NIR-Check profile: fast or full"
      functions_limit:
        type: string
        required: false
        default: "10"
        description: "Limit functions analyzed per binary"
      update_latest:
        type: boolean
        required: false
        default: false
        description: "Update latest baseline (caution: only on stable runs)"

env:
  CARGO_TERM_COLOR: always

jobs:
  nir-check:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v7
        with:
          lfs: false
          submodules: recursive

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust Build
        uses: Swatinem/rust-cache@v2

      # Lane `nir` points at this path; exe is gitignored like cli-smoke — build from checked-in C source.
      # Use apt-get directly: cache-apt-pkgs-action can restore without exposing mingw on PATH (exit 127).
      - name: Install MinGW-w64 (PE nir-lane fixture)
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-mingw-w64-x86-64
          command -v x86_64-w64-mingw32-gcc

      - name: Build PE nir-lane fixture (MinGW-w64)
        run: |
          set -euo pipefail
          OUT="/tmp/ci-fixtures/test_functions.exe"
          mkdir -p "$(dirname "${OUT}")"
          x86_64-w64-mingw32-gcc -O2 -g -m64 -static \
            .github/fixtures/test_functions.c \
            -o "${OUT}"
          test -s "${OUT}"

      - name: Build fission-cli (Release)
        run: cargo build -p fission-cli --locked --release

      - name: Run automation crate tests
        run: cargo test -p fission-automation --locked --verbose

      - name: Run NIR-Check Automation
        # NOTE: Full nir-check run requires Sleigh specs (utils/sleigh-specs, local-only LFS).
        # Run locally: cargo run -p fission-automation -- nir-check --lane nir
        # CI validates build + automation crate tests only.
        run: echo "nir-check skipped in CI (Sleigh specs are local-only)"

      - name: Upload Automation Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: nir-check-artifacts-${{ github.sha }}
          path: /tmp/nir-check-artifacts/
          retention-days: 14
          if-no-files-found: warn
