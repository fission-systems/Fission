name: CD Release

# Canonical tags: vX.Y.Z (matches softprops/action-gh-release defaults).
# Bare semver X.Y.Z is also accepted so local/git tags stay consistent with Cargo versions.
on:
  push:
    tags:
      - "v*.*.*"
      - "[0-9]*.[0-9]*.[0-9]*"

permissions:
  contents: write

concurrency:
  group: cd-release-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  build-and-release:
    name: 🚀 Build & Release
    runs-on: ${{ matrix.os }}
    timeout-minutes: 50
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact_name: fission_cli
            asset_name: fission-linux-x64
            benchmark_asset_name: fission_cli-x86_64-unknown-linux-gnu
            archive_ext: tar.gz
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact_name: fission_cli
            asset_name: fission-macos-arm64
            benchmark_asset_name: ""
            archive_ext: tar.gz
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact_name: fission_cli.exe
            asset_name: fission-windows-x64
            benchmark_asset_name: ""
            archive_ext: zip

    steps:
      - uses: actions/checkout@v7

        with:
          lfs: true
          submodules: recursive


      - name: Setup Utils
        uses: ./.github/actions/setup-utils
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust Build
        uses: Swatinem/rust-cache@v2

      - name: Build fission-cli (Release)
        run: cargo build -p fission-cli --locked --release --target ${{ matrix.target }} --verbose

      - name: Release CLI smoke
        shell: bash
        run: |
          set -euo pipefail
          CLI="target/${{ matrix.target }}/release/${{ matrix.artifact_name }}"
          test -s "${CLI}"
          "${CLI}" --version

      - name: Benchmark consumer smoke (Linux)
        if: runner.os == 'Linux'
        env:
          FISSION_SLEIGH_SPEC_DIR: ${{ github.workspace }}/utils/sleigh-specs
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y gcc-mingw-w64-x86-64
          BIN="/tmp/fission-release-smoke/test_functions.exe"
          mkdir -p "$(dirname "${BIN}")"
          x86_64-w64-mingw32-gcc -O2 -g -m64 -static \
            .github/fixtures/test_functions.c \
            -o "${BIN}"
          CLI="target/${{ matrix.target }}/release/${{ matrix.artifact_name }}"
          "${CLI}" info "${BIN}"
          "${CLI}" list "${BIN}" --json
          ADDR="$("${CLI}" list "${BIN}" --json | python3 .github/scripts/pick_pe_smoke_decomp_addr.py)"
          OUT=$("${CLI}" decomp "${BIN}" --addr "${ADDR}" --profile speed --timeout-ms 180000 --json)
          echo "${OUT}" | python3 .github/scripts/check_decomp_output.py

      - name: Prepare Package Directory
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p release_pkg
          cp target/${{ matrix.target }}/release/${{ matrix.artifact_name }} release_pkg/
          
          # Copy Resources (Ghidra data)
          if [ -d ghidra ]; then
            cp -r ghidra release_pkg/
          elif [ -d ghidra_decompiler ]; then
            cp -r ghidra_decompiler release_pkg/
          else
            echo "ℹ️  No ghidra resource directory found; skipping copy"
          fi
          
          # Runtime resource bundle (sleigh / signatures / ghidra-data).
          # Populated by setup-utils (assets-v* download) and/or LFS checkout.
          if [ ! -d utils/sleigh-specs ]; then
            echo "❌ utils/sleigh-specs missing — cannot ship a usable resource bundle"
            exit 1
          fi
          slaspec_count=$(find utils/sleigh-specs -name "*.slaspec" 2>/dev/null | wc -l | tr -d ' ')
          echo "Packaging utils/ (.slaspec count=${slaspec_count})"
          test "${slaspec_count}" -gt 10
          cp -a utils release_pkg/

      - name: Create benchmark raw CLI asset (Linux)
        if: runner.os == 'Linux'
        shell: bash
        run: |
          set -euo pipefail
          cp target/${{ matrix.target }}/release/${{ matrix.artifact_name }} "${{ matrix.benchmark_asset_name }}"
          chmod +x "${{ matrix.benchmark_asset_name }}"
          "./${{ matrix.benchmark_asset_name }}" --version
          shasum -a 256 "${{ matrix.benchmark_asset_name }}" > "${{ matrix.benchmark_asset_name }}.sha256"
          cat "${{ matrix.benchmark_asset_name }}.sha256"

      - name: Create Archive (Unix)
        if: runner.os != 'Windows'
        run: |
          cd release_pkg
          tar -czf ../${{ matrix.asset_name }}.tar.gz *
          cd ..
          ls -lh ${{ matrix.asset_name }}.tar.gz

      - name: Create Archive (Windows)
        if: runner.os == 'Windows'
        run: |
          cd release_pkg
          7z a ../${{ matrix.asset_name }}.zip *
          cd ..
          dir ${{ matrix.asset_name }}.zip

      - name: Generate SHA256 Checksum
        shell: bash
        run: |
          if [ "${{ runner.os }}" = "Windows" ]; then
            certutil -hashfile ${{ matrix.asset_name }}.${{ matrix.archive_ext }} SHA256 | head -1 > ${{ matrix.asset_name }}.sha256
          else
            shasum -a 256 ${{ matrix.asset_name }}.${{ matrix.archive_ext }} > ${{ matrix.asset_name }}.sha256
          fi
          cat ${{ matrix.asset_name }}.sha256

      - name: Upload Release Assets
        uses: softprops/action-gh-release@v1
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          files: |
            ${{ matrix.asset_name }}.${{ matrix.archive_ext }}
            ${{ matrix.asset_name }}.sha256
          draft: false
          prerelease: false

      - name: Upload Benchmark CLI Asset
        uses: softprops/action-gh-release@v1
        if: startsWith(github.ref, 'refs/tags/') && runner.os == 'Linux'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          files: |
            ${{ matrix.benchmark_asset_name }}
            ${{ matrix.benchmark_asset_name }}.sha256
          draft: false
          prerelease: false

  # Standalone utils/ resource bundle on the same SemVer release (once, Linux).
  # Consumers and CI setup-utils can pin either assets-v* or this versioned asset.
  publish-utils-bundle:
    name: 📦 Publish fission-utils bundle
    runs-on: ubuntu-latest
    timeout-minutes: 30
    # Do not depend on matrix builds — packaging is platform-independent.
    steps:
      - uses: actions/checkout@v7
        with:
          lfs: true
          submodules: recursive

      - name: Setup Utils
        uses: ./.github/actions/setup-utils

      - name: Package fission-utils.tar.gz
        shell: bash
        run: |
          set -euo pipefail
          test -d utils/sleigh-specs
          slaspec_count=$(find utils/sleigh-specs -name "*.slaspec" 2>/dev/null | wc -l | tr -d ' ')
          echo "utils .slaspec count: ${slaspec_count}"
          test "${slaspec_count}" -gt 10

          # Archive top-level `utils/` so setup-utils can:
          #   tar -xzf fission-utils.tar.gz -C utils --strip-components=1
          tar -czf fission-utils.tar.gz utils
          shasum -a 256 fission-utils.tar.gz > fission-utils.tar.gz.sha256
          ls -lh fission-utils.tar.gz
          cat fission-utils.tar.gz.sha256

          # Inventory for release notes / debugging
          {
            echo "fission-utils bundle inventory"
            echo "slaspec_count=${slaspec_count}"
            du -sh utils utils/* 2>/dev/null || true
            find utils -type f | wc -l | awk '{print "file_count="$1}'
          } | tee fission-utils.inventory.txt

      - name: Upload utils assets to GitHub Release
        uses: softprops/action-gh-release@v1
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          files: |
            fission-utils.tar.gz
            fission-utils.tar.gz.sha256
            fission-utils.inventory.txt
          draft: false
          prerelease: false

  # Release validation job
  release-summary:
    name: ✅ Release Summary
    needs: [build-and-release, publish-utils-bundle]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Check Release Status
        run: |
          if [ "${{ needs.build-and-release.result }}" != "success" ]; then
            echo "❌ Release build failed"
            exit 1
          fi
          if [ "${{ needs.publish-utils-bundle.result }}" != "success" ]; then
            echo "❌ Utils bundle publish failed"
            exit 1
          fi
          echo "✅ Release artifacts created successfully!"
          echo ""
          echo "Tag: ${{ github.ref_name }}"
          echo "Assets include:"
          echo "  - fission-linux-x64 / macos-arm64 / windows-x64 (CLI + utils inside archive)"
          echo "  - fission-utils.tar.gz (standalone resource bundle)"
          echo "  - fission_cli-x86_64-unknown-linux-gnu (Linux CLI only, for benchmark consumers)"
          echo "Release assets will be available at:"
          echo "https://github.com/${{ github.repository }}/releases/tag/${{ github.ref_name }}"
