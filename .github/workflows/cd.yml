name: CD Release

on:
    push:
        tags:
            - "v*.*.*"

permissions:
    contents: write

concurrency:
  group: cd-release-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
    build-and-release:
        name: Build & Release
        runs-on: ${{ matrix.os }}
        timeout-minutes: 45
        strategy:
            matrix:
                include:
                    - os: ubuntu-latest
                      target: x86_64-unknown-linux-gnu
                      artifact_name: fission_cli
                      asset_name: fission-linux-x64
                      archive_ext: tar.gz
                    - os: macos-latest
                      target: aarch64-apple-darwin
                      artifact_name: fission_cli
                      asset_name: fission-macos-arm64
                      archive_ext: tar.gz
                    - os: windows-latest
                      target: x86_64-pc-windows-msvc
                      artifact_name: fission_cli.exe
                      asset_name: fission-windows-x64
                      archive_ext: zip

        steps:
            - uses: actions/checkout@v4
              with:
                  submodules: recursive

            - name: Install Rust
              uses: dtolnay/rust-toolchain@stable
              with:
                  targets: ${{ matrix.target }}

            # --- Rust Build Steps ---

            - name: Build Rust Binary (Release)
              run: cargo build -p fission-cli --locked --release --target ${{ matrix.target }}

            # --- Packaging ---

            - name: Prepare Package Directory
              shell: bash
              run: |
                  mkdir -p release_pkg
                  # Copy Rust binary
                  cp target/${{ matrix.target }}/release/${{ matrix.artifact_name }} release_pkg/

                  # Copy Resources (Ghidra data)
                  if [ -d ghidra ]; then
                    cp -r ghidra release_pkg/
                  elif [ -d ghidra_decompiler ]; then
                    cp -r ghidra_decompiler release_pkg/
                  else
                    echo "No ghidra resource directory found; skipping copy"
                  fi

            - name: Create Archive (Unix)
              if: runner.os != 'Windows'
              run: |
                  cd release_pkg
                  tar -czf ../${{ matrix.asset_name }}.tar.gz *

            - name: Create Archive (Windows)
              if: runner.os == 'Windows'
              run: |
                  cd release_pkg
                  7z a ../${{ matrix.asset_name }}.zip *

            # --- Release Upload ---

            - name: Upload Release Asset
              uses: softprops/action-gh-release@v1
              if: startsWith(github.ref, 'refs/tags/')
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              with:
                  files: ${{ matrix.asset_name }}.${{ matrix.archive_ext }}
                  draft: false
                  prerelease: false
