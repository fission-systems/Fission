name: Reusable Run Tests

on:
  workflow_call:
    inputs:
      os:
        type: string
        required: false
        default: ubuntu-latest
      crates:
        type: string
        required: false
        description: "Specific crates to test (comma-separated, e.g. fission-pcode,fission-automation)"
      profile:
        type: string
        required: false
        default: "debug"
        description: "Build profile: debug or release"
      exclude_crates:
        type: string
        required: false
        default: "fission-static"
        description: "Crates to exclude from full suite"
      timeout_minutes:
        type: number
        required: false
        default: 45
        description: "Job timeout; raise on slow runners (e.g. Windows release tests)"
      retries:
        type: number
        required: false
        default: 2
        description: "Number of retries for flaky tests (nextest --retries)"

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    runs-on: ${{ inputs.os }}
    timeout-minutes: ${{ inputs.timeout_minutes }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust Build
        uses: Swatinem/rust-cache@v2

      - name: Install cargo-nextest
        uses: taiki-e/install-action@nextest

      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libssl-dev \
            librsvg2-dev \
            libayatana-appindicator3-dev \
            build-essential \
            file

      # --- Specific crates mode ---
      - name: Run Tests (Specific Crates) [nextest]
        if: ${{ inputs.crates != '' }}
        shell: bash
        run: |
          crates="${{ inputs.crates }}"
          IFS=',' read -ra CRATE_ARRAY <<< "$crates"
          for crate in "${CRATE_ARRAY[@]}"; do
            crate="$(echo "$crate" | tr -d '[:space:]')"
            echo "Testing crate: $crate"
            cargo nextest run \
              -p "$crate" \
              --locked \
              --no-fail-fast \
              --retries ${{ inputs.retries }} \
              ${{ inputs.profile == 'release' && '--release' || '' }}
          done

      # Doctests: nextest does not run doctests — run separately with cargo test --doc
      - name: Run Doctests (Specific Crates)
        if: ${{ inputs.crates != '' }}
        shell: bash
        run: |
          crates="${{ inputs.crates }}"
          IFS=',' read -ra CRATE_ARRAY <<< "$crates"
          for crate in "${CRATE_ARRAY[@]}"; do
            crate="$(echo "$crate" | tr -d '[:space:]')"
            cargo test --doc -p "$crate" --locked \
              ${{ inputs.profile == 'release' && '--release' || '' }} || true
          done

      # --- Full workspace mode ---
      - name: Run Full Test Suite (All Crates) [nextest]
        if: ${{ inputs.crates == '' }}
        shell: bash
        run: |
          exclude_flags=()
          if [ -n "${{ inputs.exclude_crates }}" ]; then
            IFS=',' read -ra EX <<< "${{ inputs.exclude_crates }}"
            for c in "${EX[@]}"; do
              c="$(echo "$c" | tr -d '[:space:]')"
              [ -z "$c" ] && continue
              exclude_flags+=(--exclude "$c")
            done
          fi
          cargo nextest run \
            --workspace \
            "${exclude_flags[@]}" \
            --locked \
            --no-fail-fast \
            --retries ${{ inputs.retries }} \
            ${{ inputs.profile == 'release' && '--release' || '' }}
          # Also run excluded crates separately
          cargo nextest run \
            -p fission-static \
            --locked \
            --no-fail-fast \
            --retries ${{ inputs.retries }} \
            ${{ inputs.profile == 'release' && '--release' || '' }}

      - name: Run Workspace Doctests
        if: ${{ inputs.crates == '' }}
        shell: bash
        run: |
          cargo test --doc --workspace --locked \
            ${{ inputs.profile == 'release' && '--release' || '' }} || true
