name: Security Audit

on:
    push:
        paths:
            - "**/Cargo.lock"
    pull_request:
        paths:
            - "**/Cargo.lock"
    schedule:
        - cron: "0 0 * * *" # 매일 자정 실행

jobs:
    audit:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - name: Audit Check
              uses: actions-rs/audit-check@v1
              with:
                  token: ${{ secrets.GITHUB_TOKEN }}
