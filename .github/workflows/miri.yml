name: Miri (Undefined Behavior Check)

on:
    push:
        branches: [main]
    schedule:
        - cron: "0 4 * * 0" # 매주 일요일 새벽 4시

jobs:
    miri:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4

            - name: Install Rust Nightly (Miri requires nightly)
              uses: dtolnay/rust-toolchain@nightly
              with:
                  components: miri

            - name: Miri Test
              run: cargo miri test
              env:
                  MIRIFLAGS: "-Zmiri-disable-isolation" # 외부 파일 접근 등이 필요할 경우
