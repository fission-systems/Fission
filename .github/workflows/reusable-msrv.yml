name: Reusable MSRV Check

# Validates that the codebase compiles on the declared minimum supported Rust version (MSRV).
# MSRV is read from rust-version in the workspace Cargo.toml.
# This prevents accidentally using Rust features newer than the declared floor.

on:
  workflow_call:
    inputs:
      crates:
        type: string
        required: false
        default: "fission-pcode,fission-loader,fission-decompiler,fission-automation"
        description: "Crates to check against MSRV (comma-separated)"

env:
  CARGO_TERM_COLOR: always

jobs:
  msrv:
    name: MSRV Check
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        
        with:
          lfs: false
        with:
          submodules: recursive

      - name: Read MSRV from workspace Cargo.toml
        id: msrv
        run: |
          # Try workspace.package.rust-version, then package.rust-version
          MSRV=$(python3 - <<'PY'
          import tomllib, pathlib, sys
          try:
              data = tomllib.loads(pathlib.Path("Cargo.toml").read_text())
              msrv = (
                  data.get("workspace", {}).get("package", {}).get("rust-version")
                  or data.get("package", {}).get("rust-version")
              )
              print(msrv or "")
          except Exception as e:
              print("", file=sys.stderr)
          PY
          )
          if [ -z "$MSRV" ]; then
            echo "::warning::rust-version not set in Cargo.toml — skipping MSRV check"
            echo "msrv=" >> "$GITHUB_OUTPUT"
          else
            echo "MSRV detected: $MSRV"
            echo "msrv=$MSRV" >> "$GITHUB_OUTPUT"
          fi

      - name: Install MSRV Rust toolchain
        if: steps.msrv.outputs.msrv != ''
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ steps.msrv.outputs.msrv }}

      - name: Cache Rust Build (MSRV)
        if: steps.msrv.outputs.msrv != ''
        uses: Swatinem/rust-cache@v2
        with:
          key: msrv-${{ steps.msrv.outputs.msrv }}

      - name: Install system dependencies (Linux)
        if: steps.msrv.outputs.msrv != '' && runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libssl-dev \
            librsvg2-dev \
            build-essential

      - name: Check crates on MSRV
        if: steps.msrv.outputs.msrv != ''
        shell: bash
        run: |
          MSRV="${{ steps.msrv.outputs.msrv }}"
          crates="${{ inputs.crates }}"
          IFS=',' read -ra CRATE_ARRAY <<< "$crates"
          FAILED=0
          for crate in "${CRATE_ARRAY[@]}"; do
            crate="$(echo "$crate" | tr -d '[:space:]')"
            echo "MSRV check: $crate on Rust $MSRV"
            cargo +"$MSRV" check -p "$crate" --locked || {
              echo "::error::$crate fails to compile on MSRV $MSRV"
              FAILED=1
            }
          done
          exit $FAILED

      - name: MSRV summary
        if: always()
        run: |
          MSRV="${{ steps.msrv.outputs.msrv }}"
          if [ -z "$MSRV" ]; then
            echo "ℹ️ MSRV not declared in Cargo.toml — check skipped"
          else
            echo "MSRV validated: Rust $MSRV"
          fi
