name: Run Canonical Corpus Benchmark

on:
  workflow_call:
    inputs:
      upload_artifacts:
        required: false
        type: boolean
        default: true
      baseline_branch:
        required: false
        type: string
        default: "main"

env:
  CARGO_TERM_COLOR: always
  FISSION_SLEIGH_SPEC_DIR: ${{ github.workspace }}/utils/sleigh-specs
  # Matches benchmark/full_benchmark DEFAULT_GHIDRA_DIRS and fission-sleigh resolver hints.
  GHIDRA_INSTALL_DIR: vendor/ghidra/ghidra_12.0.4_PUBLIC
  GHIDRA_RELEASE_ZIP_URL: https://github.com/NationalSecurityAgency/ghidra/releases/download/Ghidra_12.0.4_build/ghidra_12.0.4_PUBLIC_20260303.zip

jobs:
  benchmark:
    runs-on: ubuntu-latest
    name: Canonical Corpus Benchmark
    timeout-minutes: 120
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v7
        with:
          submodules: recursive
          lfs: true

      - name: Setup Java for Ghidra
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"

      # vendor/ghidra is not vendored in git — fetch the official PUBLIC bundle (same family as local dev paths).
      - name: Restore Ghidra installation (cached)
        id: ghidra-cache
        uses: actions/cache@v4
        with:
          path: ${{ env.GHIDRA_INSTALL_DIR }}
          key: ghidra-12.0.4-public-20260303-${{ runner.os }}-v1

      - name: Download and extract Ghidra
        if: steps.ghidra-cache.outputs.cache-hit != 'true'
        run: |
          set -euo pipefail
          mkdir -p "$(dirname "${GHIDRA_INSTALL_DIR}")"
          curl -fsSL "${GHIDRA_RELEASE_ZIP_URL}" -o /tmp/ghidra-public.zip
          unzip -q /tmp/ghidra-public.zip -d "$(dirname "${GHIDRA_INSTALL_DIR}")"
          rm -f /tmp/ghidra-public.zip
          test -f "${GHIDRA_INSTALL_DIR}/support/analyzeHeadless"

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build outputs
        uses: Swatinem/rust-cache@v2

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install benchmark Python dependencies
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install -r benchmark/full_benchmark/requirements-benchmark.txt pyghidra

      - name: Build fission-cli (release)
        run: cargo build -p fission-cli --locked --release

      # Smoke corpus entries point at benchmark/binary/**/.exe (gitignored); cross-compile from tracked C sources.
      - name: Install MinGW-w64 (smoke corpus PE)
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-mingw-w64-x86-64
          command -v x86_64-w64-mingw32-gcc

      - name: Build smoke corpus PE binaries (window/small C)
        run: |
          set -euo pipefail
          bash benchmark/binary/x86-64/window/small/source/c/build.sh
          for name in test_functions bitops_and_control_flow structs_and_pointers function_pointers_and_strings array_operations; do
            f="benchmark/binary/x86-64/window/small/binary/c/${name}.exe"
            test -s "$f"
            echo "ok $f"
          done

      - name: Sleigh load_spec vs entry-id parity (canonical raw-P-code row)
        run: python3 benchmark/raw_p_code_benchmark/run_frontend_load_spec_parity.py --cargo-profile release

      - name: Run advisory smoke corpus benchmark
        id: benchmark
        run: |
          OUT_DIR="benchmark/artifacts/full_benchmark/ci-heavy-smoke-balanced-latest"
          python3 benchmark/full_benchmark/full_decomp_benchmark.py \
            --corpus-manifest benchmark/config/benchmark_corpus/smoke_corpus.json \
            --fission-bin target/release/fission_cli \
            --ghidra-dir "$GHIDRA_INSTALL_DIR" \
            --output-dir "$OUT_DIR"
          echo "output_dir=$OUT_DIR" >> "$GITHUB_OUTPUT"

      - name: Publish benchmark summary to job summary
        run: |
          python3 - <<'PY'
          import json
          import os
          from pathlib import Path

          output_dir = Path("${{ steps.benchmark.outputs.output_dir }}")
          summary = json.loads((output_dir / "benchmark_summary.json").read_text(encoding="utf-8"))
          corpus = summary.get("corpus_summary", {}) or {}
          blockers = summary.get("promotion_blockers", []) or []
          arch = summary.get("arch_summary", {}) or {}

          lines = [
              "## Canonical Corpus Benchmark",
              "",
              f"- benchmark status: {corpus.get('status', 'unknown')}",
              f"- gate mode: {summary.get('gate_mode', 'unknown')}",
              f"- release promotion eligibility: {summary.get('release_promotion_allowed', False)}",
              f"- comparable to baseline: {summary.get('comparable_to_baseline', False)}",
              f"- baseline artifact: {summary.get('baseline_artifact') or 'none'}",
              "",
              "### x86 / x64 Split",
              "",
          ]
          for arch_name in ("x86", "x64"):
              payload = arch.get(arch_name, {}) or {}
              lines.append(
                  f"- {arch_name}: binaries={payload.get('binary_count', 0)}, "
                  f"weighted_avg_normalized_similarity={payload.get('weighted_avg_normalized_similarity', 0.0):.3f}"
              )
          if blockers:
              lines.extend(["", "### Promotion Blockers", ""])
              lines.extend([f"- {item}" for item in blockers[:20]])

          summary_path = os.environ["GITHUB_STEP_SUMMARY"]
          with open(summary_path, "a", encoding="utf-8") as handle:
              handle.write("\n".join(lines) + "\n")
          PY

      # Download previous baseline for regression comparison.
      # If no baseline artifact exists yet (first run), this step is skipped gracefully.
      - name: Download previous benchmark baseline
        id: baseline_dl
        continue-on-error: true
        uses: actions/download-artifact@v4
        with:
          name: benchmark-baseline-latest
          path: benchmark_baseline/

      - name: Benchmark regression check
        run: |
          python3 - <<'PY'
          import json, os, sys
          from pathlib import Path

          REGRESSION_THRESHOLD = 0.02  # 2% drop triggers failure

          output_dir = Path("${{ steps.benchmark.outputs.output_dir }}")
          current_file = output_dir / "benchmark_summary.json"
          baseline_file = Path("benchmark_baseline/benchmark_summary.json")

          if not current_file.exists():
              print("⚠️ Current benchmark summary not found, skipping regression check")
              sys.exit(0)

          current = json.loads(current_file.read_text(encoding="utf-8"))

          if not baseline_file.exists():
              print("ℹ️ No previous baseline found — this run will become the new baseline")
              sys.exit(0)

          baseline = json.loads(baseline_file.read_text(encoding="utf-8"))

          step_summary = os.environ.get("GITHUB_STEP_SUMMARY", "")
          regression_lines = ["", "## Benchmark Regression Check", ""]
          failed = False

          for arch in ("x86", "x64"):
              cur_arch = current.get("arch_summary", {}).get(arch, {}) or {}
              base_arch = baseline.get("arch_summary", {}).get(arch, {}) or {}
              cur_sim = cur_arch.get("weighted_avg_normalized_similarity", 0.0)
              base_sim = base_arch.get("weighted_avg_normalized_similarity", 0.0)

              if base_sim == 0.0:
                  regression_lines.append(f"- {arch}: baseline={base_sim:.3f}, current={cur_sim:.3f} — baseline is zero, skipping")
                  continue

              delta = cur_sim - base_sim
              delta_pct = delta / base_sim

              status_emoji = "✅"
              if delta_pct < -REGRESSION_THRESHOLD:
                  status_emoji = "❌"
                  failed = True

              regression_lines.append(
                  f"- {status_emoji} {arch}: baseline={base_sim:.3f} → current={cur_sim:.3f} "
                  f"(delta={delta:+.3f}, {delta_pct:+.1%})"
              )

          if failed:
              regression_lines += [
                  "",
                  "> [!CAUTION]",
                  f"> Benchmark quality dropped by more than {REGRESSION_THRESHOLD:.0%} from baseline.",
                  "> Investigate regression before merging.",
              ]

          if step_summary:
              with open(step_summary, "a", encoding="utf-8") as f:
                  f.write("\n".join(regression_lines) + "\n")
          else:
              print("\n".join(regression_lines))

          if failed:
              sys.exit(1)
          PY

      # Save current run as the new baseline for future comparisons.
      - name: Save benchmark as new baseline
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-baseline-latest
          path: ${{ steps.benchmark.outputs.output_dir }}/benchmark_summary.json
          retention-days: 90
          overwrite: true

      - name: Upload benchmark artifacts
        if: inputs.upload_artifacts
        uses: actions/upload-artifact@v4
        with:
          name: canonical-corpus-benchmark-${{ github.sha }}
          path: ${{ steps.benchmark.outputs.output_dir }}
          retention-days: 30
          if-no-files-found: warn

