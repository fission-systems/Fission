[workspace]
resolver = "2"
# Tauri GUI 크레이트: 경로가 없다면 아래 한 줄을 주석 처리하면 cargo/rust-analyzer가 나머지 워크스페이스만 로드합니다.
# 자세한 내용은 docs/build/BUILD.md "Rust 워크스페이스 / rust-analyzer" 섹션 참고.
members = [
    "crates/fission-core",
    "crates/fission-disasm",
    "crates/fission-loader",
    "crates/fission-pcode",
    "crates/fission-signatures",
    "crates/fission-static",
    "crates/fission-dynamic",
    "crates/fission-analysis",
    "crates/fission-cli",
    "crates/fission-ffi",
    "crates/fission-tauri/src-tauri",
]

[profile.release]
opt-level = 3
lto = true
strip = true
codegen-units = 1
