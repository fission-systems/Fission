[workspace]
resolver = "2"
# Tauri GUI crate: if this path is unavailable, comment out the member below
# so Cargo and rust-analyzer can still load the rest of the workspace.
# See docs/build/BUILD.md, "Rust workspace / rust-analyzer".
members = [
    "crates/fission-core",
    "crates/fission-disasm",
    "crates/fission-loader",
    "crates/fission-pcode",
    "crates/fission-signatures",
    "crates/fission-static",
    "crates/fission-dynamic",
    "crates/fission-analysis",
    "crates/fission-cli",
    "crates/fission-ffi",
    "crates/fission-tauri/src-tauri",
]

[profile.release]
opt-level = 3
lto = true
strip = true
codegen-units = 1
