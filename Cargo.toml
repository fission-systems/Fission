[package]
name = "fission"
version = "0.1.0"
edition = "2021"
authors = ["Fission Dev Team"]
description = "Next-Gen Dynamic Instrumentation Platform"
license = "MIT"
repository = "https://github.com/sjkim1127/Fission"
default-run = "fission"

[lib]
name = "fission"
path = "src/lib.rs"

[[bin]]
name = "fission"
path = "src/main.rs"

# Release optimizations
[profile.release]
opt-level = 3
lto = true
strip = true
codegen-units = 1

[features]
default = ["gui", "cli"]
gui = ["dep:eframe", "dep:egui", "dep:rfd", "dep:egui_extras"]
cli = ["dep:reedline", "dep:clap"]
python = ["dep:pyo3"]
native_decomp = []

[dependencies]
# 1. GUI & Rendering
eframe = { version = "0.29", optional = true }
egui = { version = "0.29", optional = true }
rfd = { version = "0.15", optional = true }
egui_extras = { version = "0.29", features = ["all_loaders"], optional = true }
once_cell = "1.19"
libloading = "0.8"

# 2. CLI & Input
reedline = { version = "0.30", optional = true }
clap = { version = "4.5", features = ["derive"], optional = true }

# 3. Binary Parsing & Disassembly
goblin = "0.8"
object = "0.32"
iced-x86 = { version = "1.21", features = ["std"] }  # Fast x86/x64 disassembler

# 4. Scripting
pyo3 = { version = "0.24", features = ["auto-initialize"], optional = true }

# 6. Async & Utilities
bytes = "1.5"
tokio = { version = "1.36", features = ["full", "rt-multi-thread"] }
anyhow = "1.0"
thiserror = "1.0"
log = "0.4"
env_logger = "0.11"
hex = "0.4"
base64 = "0.22"
colored = "2.1"
regex = "1.10"  # For efficient pattern matching
lru = "0.12"    # LRU cache for decompilation results
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
toml = "0.8"
dirs = "5.0"
flate2 = "1.1.5"
sysinfo = "0.37.2"

# System & Debugging
[target.'cfg(target_os = "windows")'.dependencies]
windows = { version = "0.54", features = [
    "Win32_System_Diagnostics_Debug",
    "Win32_System_Threading",
    "Win32_System_Memory",
    "Win32_Foundation",
    "Win32_Security",
    "Win32_System_ProcessStatus",
    "Win32_System_Kernel",
] }

[target.'cfg(target_os = "linux")'.dependencies]
nix = { version = "0.28", features = ["ptrace", "process"] }


[build-dependencies]
cc = "1.0"

[dev-dependencies]
proptest = "1.4"
insta = { version = "1.34", features = ["yaml"] } # json/yaml support for snapshots
criterion = "0.5"

[[bench]]
name = "benchmark"
harness = false

