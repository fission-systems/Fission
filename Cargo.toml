[package]
name = "fission"
version = "0.1.0"
edition = "2021"
authors = ["Fission Dev Team"]
description = "Next-Gen Dynamic Instrumentation Platform"
license = "MIT"
repository = "https://github.com/sjkim1127/Fission"
default-run = "fission"

[lib]
name = "fission"
path = "src/lib.rs"

[[bin]]
name = "fission"
path = "src/main.rs"

# Release optimizations
[profile.release]
opt-level = 3
lto = true
strip = true
codegen-units = 1

[features]
default = []
python = ["pyo3"]
native_decomp = []

[dependencies]
# 1. GUI & Rendering
eframe = "0.29"
egui = "0.29"
rfd = "0.15"  # Native file dialogs (also updated for compatibility)
egui_extras = { version = "0.29", features = ["all_loaders"] }
once_cell = "1.19"
libloading = "0.8"

# 2. CLI & Input
reedline = "0.30"
clap = { version = "4.5", features = ["derive"] }

# 3. Binary Parsing & Disassembly
goblin = "0.8"
object = "0.32"
iced-x86 = { version = "1.21", features = ["std"] }  # Fast x86/x64 disassembler

# 4. Scripting
pyo3 = { version = "0.24", features = ["auto-initialize"], optional = true }

# 6. Async & Utilities
bytes = "1.5"
tokio = { version = "1.36", features = ["full", "rt-multi-thread"] }
anyhow = "1.0"
thiserror = "1.0"
log = "0.4"
env_logger = "0.11"
hex = "0.4"
base64 = "0.22"
colored = "2.1"
regex = "1.10"  # For efficient pattern matching
lru = "0.12"    # LRU cache for decompilation results
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
toml = "0.8"
dirs = "5.0"
flate2 = "1.1.5"

# System & Debugging
[target.'cfg(target_os = "windows")'.dependencies]
windows = { version = "0.54", features = [
    "Win32_System_Diagnostics_Debug",
    "Win32_System_Threading",
    "Win32_System_Memory",
    "Win32_Foundation",
    "Win32_Security",
    "Win32_System_ProcessStatus",
    "Win32_System_Kernel",
] }

[target.'cfg(target_os = "linux")'.dependencies]
nix = { version = "0.28", features = ["ptrace", "process"] }

[build-dependencies]
cc = "1.0"
